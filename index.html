<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https: fonts.googleapis.com; font-src https: fonts.gstatic.com;">
<title>Legends of Daybreak - RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  /* Dark theme (default) */
  --bg: #0f0e17;
  --bg-card: #1a1925;
  --bg-hover: #242236;
  --border: #2d2b3a;
  --text: #e8e6f0;
  --text-dim: #9ca3af;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --hp: #ef4444;
  --mp: #3b82f6;
  --xp: #eab308;
  --gold: #f59e0b;
  --success: #22c55e;
  --danger: #ef4444;
  --rest: #10b981;
  --rest-dim: #065f46;
  --dialogue: #f0abfc;
  --log-bg: #16141f;
  --nav-bg: #1a1925;
  --timer-bg: #2d2b3a;
  --disabled: #6b6560;
  --empty: #6b6560;
  --shadow-accent: #7c3aed40;
  --shadow-danger: #ef444440;
  --shadow-rest: #10b98140;
  --glow-rest: #10b98120;
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg-card: #ffffff;
  --bg-hover: #ebe8e1;
  --border: #d4d0c8;
  --text: #2d2a26;
  --text-dim: #6b6560;
  --accent: #6d28d9;
  --accent-light: #8b5cf6;
  --hp: #dc2626;
  --mp: #2563eb;
  --xp: #ca8a04;
  --gold: #d97706;
  --success: #16a34a;
  --danger: #dc2626;
  --rest: #059669;
  --rest-dim: #065f46;
  --dialogue: #c026d3;
  --log-bg: #e8e5de;
  --nav-bg: #ffffff;
  --timer-bg: #d4d0c8;
  --disabled: #a8a29e;
  --empty: #a8a29e;
  --shadow-accent: #7c3aed25;
  --shadow-danger: #ef444425;
  --shadow-rest: #10b98125;
  --glow-rest: #10b98115;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.hdr { background: linear-gradient(135deg, var(--nav-bg), var(--bg-hover)); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.hdr-l { display: flex; align-items: center; gap: 10px; }
.pname { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
.cls { font-size: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.lvl { background: var(--xp); color: #000; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
.hdr-r { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
.sb { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.si { width: 24px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-dim); }
.bar { flex: 1; height: 8px; background: var(--timer-bg); border-radius: 4px; overflow: hidden; }
.bf { height: 100%; border-radius: 4px; transition: width 0.3s; }
.bf-hp { background: var(--hp); } .bf-mp { background: var(--mp); } .bf-xp { background: var(--xp); }
.bt { min-width: 55px; text-align: right; font-size: 10px; color: var(--text-dim); }
.gold { font-size: 13px; font-weight: 700; color: var(--gold); text-align: right; }
.buffs { display: flex; gap: 6px; padding: 6px 16px; background: var(--nav-bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.bp { background: var(--accent); color: white; font-size: 10px; padding: 3px 10px; border-radius: 10px; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.card:hover, .card:active { border-color: var(--accent); background: var(--bg-hover); transform: translateY(-2px); }
.cicon { font-size: 28px; margin-bottom: 6px; }
.clabel { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.cdesc { font-size: 11px; color: var(--text-dim); line-height: 1.3; }
.st { font-family: 'Cinzel', serif; font-weight: 700; margin-bottom: 12px; font-size: 18px; }
.zlist { display: flex; flex-direction: column; gap: 10px; }
.zcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.zcard:hover:not(.locked) { border-color: var(--accent); }
.zcard.locked { opacity: 0.5; cursor: not-allowed; }
.zh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.zn { font-weight: 600; font-size: 15px; }
.zl { font-size: 12px; color: var(--text-dim); }
.zd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.zm { display: flex; gap: 8px; }
.db, .xb { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
.xb { background: #eab30820; color: var(--xp); }
.erow { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.ecard { background: var(--bg-card); border: 2px solid var(--border); border-radius: 14px; padding: 12px; min-width: 90px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.ecard.sel { border-color: var(--danger); box-shadow: 0 0 0 3px #ef444430; }
.ecard.dead { opacity: 0.4; border-color: #333; cursor: default; }
.eicon { font-size: 32px; margin-bottom: 4px; }
.ename { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.hps { height: 6px; background: var(--timer-bg); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.hpt { font-size: 10px; color: var(--text-dim); }
.dt { font-size: 10px; color: #666; font-style: italic; }
.pstat { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.mst { font-size: 11px; display: flex; align-items: center; gap: 4px; background: var(--bg-hover); padding: 4px 10px; border-radius: 10px; }
.md { width: 8px; height: 8px; border-radius: 50%; }
.skills h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.slist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.sbtn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.sbtn:hover:not(.dis) { border-color: var(--accent); }
.sbtn.sel { border-color: var(--accent); background: #7c3aed15; }
.sbtn.dis { opacity: 0.4; cursor: not-allowed; }
.sn { font-weight: 600; font-size: 13px; }
.sc { font-size: 11px; color: var(--mp); }
.sd { font-size: 11px; color: var(--text-dim); }
.abtn, .fbtn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; user-select: none; }
.abtn { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; }
.abtn.dis { opacity: 0.4; cursor: not-allowed; }
.fbtn { background: #374151; color: var(--text); }
.plist { display: flex; flex-direction: column; gap: 10px; }
.pcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 14px; align-items: flex-start; }
.pcard.locked { opacity: 0.5; }
.pava { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 20px; }
.pinfo { flex: 1; }
.pn { font-weight: 700; font-size: 15px; }
.pt { font-size: 12px; color: var(--text-dim); font-weight: 400; }
.pr { font-size: 12px; font-weight: 600; margin: 2px 0; }
.pd { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 4px; }
.pb { font-size: 11px; color: var(--success); font-weight: 500; }
.ps { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
.sklist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.skcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.skcard.locked { opacity: 0.5; }
.skh { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ski { font-size: 20px; }
.skt { font-weight: 700; font-size: 14px; flex: 1; }
.sks { font-size: 10px; padding: 3px 10px; border-radius: 10px; background: var(--success); color: white; }
.skcard.locked .sks { background: #6b7280; }
.skd { display: flex; gap: 8px; margin-bottom: 6px; }
.dp { font-size: 11px; background: var(--bg-hover); padding: 3px 10px; border-radius: 8px; color: var(--text-dim); }
.skdsc { font-size: 12px; color: var(--text-dim); }
.stb { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.stb h3 { font-size: 14px; margin-bottom: 10px; }
.str { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.str:last-child { border-bottom: none; }
.stn { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.stv { font-weight: 700; color: var(--accent-light); }
.eqs, .its { margin-bottom: 16px; }
.eqs h3, .its h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.eqg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.esl { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.esn { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 4px; }
.eit { font-size: 12px; font-weight: 600; }
.est { font-size: 11px; color: var(--success); }
.ese { font-size: 11px; color: var(--disabled); font-style: italic; }
.ig { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.ic { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.ii { font-size: 24px; margin-bottom: 4px; }
.in { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.iq { font-size: 11px; color: var(--text-dim); }
.ia { margin-top: 6px; }
.ib { padding: 4px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin: 2px; user-select: none; }
.ib-u { background: var(--success); color: white; }
.ib-e { background: var(--mp); color: white; }
.ei { color: var(--disabled); font-style: italic; padding: 20px; text-align: center; grid-column: span 2; }
.rlist { display: flex; flex-direction: column; gap: 10px; }
.rc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.rr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.ri { font-size: 24px; }
.rn { font-weight: 700; font-size: 14px; }
.rd { font-size: 11px; color: var(--text-dim); }
.rms { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.mp { font-size: 10px; padding: 3px 10px; border-radius: 8px; background: var(--bg-hover); color: var(--text-dim); }
.mp.ok { background: #22c55e20; color: var(--success); }
.mp.miss { background: #ef444420; color: var(--danger); }
.cb { width: 100%; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--accent); color: white; user-select: none; }
.cb.dis { opacity: 0.4; cursor: not-allowed; }
.qlist { display: flex; flex-direction: column; gap: 10px; }
.qc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.qc.done { border-color: var(--success); }
.qh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.qn { font-weight: 600; font-size: 14px; }
.qr { font-size: 11px; color: var(--gold); }
.qd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.qp { display: flex; align-items: center; gap: 10px; }
.pbar { flex: 1; height: 8px; background: var(--timer-bg); border-radius: 4px; overflow: hidden; }
.pfill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
.ptxt { font-size: 11px; color: var(--text-dim); min-width: 40px; text-align: right; }
.sum { display: flex; gap: 10px; margin-top: 16px; }
.si2 { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.sv { font-size: 20px; font-weight: 700; color: var(--accent-light); display: block; }
.sl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.fv { text-align: center; padding: 20px; }
.fc { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; }
.ft { font-size: 36px; font-weight: 700; color: var(--accent-light); font-family: 'Cinzel', serif; }
.fl { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.ftips { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; text-align: left; }
.ftips h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.ftips ul { list-style: none; padding: 0; }
.ftips li { font-size: 13px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px solid var(--border); }
.ftips li:last-child { border-bottom: none; }
.ftips li::before { content: "→ "; color: var(--accent); font-weight: 700; }
.cfb { padding: 12px 24px; border-radius: 12px; border: 1px solid var(--danger); background: transparent; color: var(--danger); font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; }
.log { background: var(--log-bg); border-top: 1px solid var(--border); padding: 10px 16px; max-height: 120px; overflow-y: auto; font-size: 12px; line-height: 1.5; flex-shrink: 0; }
.le { padding: 2px 0; color: var(--text-dim); border-bottom: 1px solid var(--nav-bg); }
.le:last-child { border-bottom: none; }
.nav { display: flex; justify-content: space-around; background: var(--nav-bg); border-top: 1px solid var(--border); padding: 6px 0; position: sticky; bottom: 0; z-index: 10; flex-shrink: 0; }
.nb { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 500; padding: 6px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; user-select: none; flex: 1; }
.nb::before { font-size: 18px; display: block; }
.nb[data-t="home"]::before { content: "🏠"; }
.nb[data-t="exp"]::before { content: "🗺️"; }
.nb[data-t="party"]::before { content: "👥"; }
.nb[data-t="quest"]::before { content: "📜"; }
.nb[data-t="craft"]::before { content: "⚒️"; }
.nb[data-t="inv"]::before { content: "🎒"; }
.nb[data-t="npc"]::before { content: "🧳"; }
.nb:hover, .nb.on { color: var(--accent-light); }

/* REST SYSTEM STYLES */
.rest-view { text-align: center; }
.rest-sites { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.rs-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s; user-select: none; text-align: left; }
.rs-card:hover:not(.locked) { border-color: var(--rest); background: #10b98110; }
.rs-card.locked { opacity: 0.4; cursor: not-allowed; }
.rs-card.active { border-color: var(--rest); background: #10b98115; }
.rs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.rs-name { font-weight: 600; font-size: 15px; }
.rs-type { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--bg-hover); color: var(--text-dim); }
.rs-type.camp { background: #10b98120; color: var(--rest); }
.rs-type.tavern { background: #f59e0b20; color: var(--gold); }
.rs-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.rs-req { font-size: 11px; color: var(--text-dim); }
.rs-req.ok { color: var(--success); }
.rs-req.fail { color: var(--danger); }
.rest-progress { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.rest-timer { font-size: 48px; font-weight: 700; color: var(--rest); font-family: 'Cinzel', serif; margin-bottom: 8px; }
.rest-label { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
.rest-bar { height: 12px; background: var(--timer-bg); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
.rest-fill { height: 100%; background: linear-gradient(90deg, var(--rest), #34d399); border-radius: 6px; transition: width 0.3s ease; }
.rest-healer { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.rest-healer.ok { color: var(--success); }
.rest-healer.fail { color: var(--danger); }
.rest-cancel { padding: 10px 24px; border-radius: 10px; border: 1px solid var(--danger); background: transparent; color: var(--danger); font-size: 13px; font-weight: 600; cursor: pointer; }
.rest-result { background: var(--bg-card); border: 1px solid var(--rest); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.rest-result h3 { color: var(--rest); font-size: 16px; margin-bottom: 8px; }
.rest-result p { font-size: 13px; color: var(--text-dim); }

/* CAMPFIRE REST - TICK STYLES */
.tick-track { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.tick { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s; }
.tick.done { background: var(--rest); border-color: var(--rest); color: white; }
.tick.current { border-color: var(--rest); box-shadow: 0 0 0 3px #10b98140; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 3px #10b98140; } 50% { box-shadow: 0 0 0 6px #10b98120; } }
.tick-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* DIALOGUE STYLES */
.dialogue-box { background: var(--nav-bg); border: 1px solid var(--dialogue); border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; animation: fadeIn 0.5s ease; }
.dialogue-box .d-speaker { font-size: 12px; font-weight: 700; color: var(--dialogue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.dialogue-box .d-text { font-size: 13px; color: var(--text); line-height: 1.5; font-style: italic; }
.dialogue-box .d-tick { font-size: 10px; color: var(--text-dim); margin-top: 6px; text-align: right; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* AMBUSH WARNING */
.ambush-warning { background: #ef444415; border: 1px solid var(--danger); border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; animation: shake 0.5s ease; }
.ambush-warning .aw-text { font-size: 13px; color: var(--danger); font-weight: 600; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

/* ELEMENTAL IMMUNITY INDICATOR */
.e-immune { font-size: 10px; color: #f59e0b; font-weight: 600; margin-top: 2px; }
.rs-type.temple { background: #7c3aed20; color: var(--accent-light); }
.temple-revive { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.temple-revive.dead { border-color: var(--danger); background: #ef444410; }
.temple-revive.alive { opacity: 0.5; }
.tr-ava { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 18px; }
.tr-info { flex: 1; text-align: left; }
.tr-name { font-weight: 600; font-size: 14px; }
.tr-status { font-size: 11px; color: var(--danger); }
.tr-status.alive { color: var(--success); }
.tr-btn { padding: 8px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; }
.tr-btn.dis { opacity: 0.4; cursor: not-allowed; background: var(--disabled); }

/* NPC / TRADER STYLES */
.npc-view { padding: 0; }
.npc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start; transition: all 0.2s; }
.npc-card:hover:not(.locked) { border-color: var(--accent); }
.npc-card.locked { opacity: 0.5; }
.npc-ava { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 22px; }
.npc-info { flex: 1; }
.npc-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.npc-type { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--accent); color: white; font-weight: 600; margin-left: 6px; }
.npc-type-trader { background: #fbbf24; color: #000; }
.npc-type-ally { background: #8b5cf6; color: white; }
.npc-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; margin-bottom: 8px; }
.npc-stock { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.npc-item { font-size: 11px; padding: 3px 10px; border-radius: 8px; background: var(--bg-hover); }
.npc-buy { font-size: 11px; padding: 6px 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; margin: 2px; }
.affinity-bar { height: 6px; background: var(--timer-bg); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.affinity-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.affinity-high { background: #ec4899; }
.affinity-mid { background: #eab308; }
.affinity-low { background: #6b7280; }
.affinity-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
.timer-bar { height: 6px; background: var(--timer-bg); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.timer-fill { height: 100%; border-radius: 3px; }
.timer-ok { background: var(--accent); }
.timer-urgent { background: var(--danger); }
.timer-expired { background: #6b7280; }
.timer-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }


.achievements-view .ach-card { transition: all 0.2s; }
.achievements-view .ach-card:hover { transform: translateX(4px); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

function rollRarity(zoneLevel, luckBonus = 0) {
  const roll = Math.random() + luckBonus;
  const tier = Math.min(zoneLevel, 10);
  if (roll > 0.995 - (tier * 0.005)) return 'legendary';
  if (roll > 0.95 - (tier * 0.01))  return 'epic';
  if (roll > 0.80 - (tier * 0.015)) return 'rare';
  if (roll > 0.50 - (tier * 0.02))  return 'uncommon';
  return 'common';
}

function generateItem(slot, zoneLevel, forceRarity) {
  const table = LOOT_TABLES[slot === 'ring1' || slot === 'ring2' ? 'ring' : slot];
  if (!table) return null;

  // Find appropriate base item by ilvl
  const candidates = table.filter(i => i.ilvl <= zoneLevel + 2);
  const base = candidates.length > 0 
    ? candidates[Math.floor(Math.random() * candidates.length)]
    : table[0];

  const rarity = forceRarity || rollRarity(zoneLevel);
  const rarityData = ITEM_RARITY[rarity];

  const item = {
    n: base.n,
    slot: slot,
    r: rarity,
    ilvl: base.ilvl,
    d: base.d || 'A piece of adventuring gear.',
    ...base
  };

  // Apply rarity multiplier to core stats
  if (item.atk) item.atk = Math.floor(item.atk * rarityData.mult);
  if (item.def) item.def = Math.floor(item.def * rarityData.mult);

  // Roll for prefix
  if (Math.random() < rarityData.prefixChance) {
    const prefixes = Object.keys(ITEM_PREFIXES);
    const pName = prefixes[Math.floor(Math.random() * prefixes.length)];
    const pData = ITEM_PREFIXES[pName];
    item.prefix = pName;
    item.prefixData = pData;
    item.n = pName + ' ' + item.n;
    item[pData.stat] = (item[pData.stat] || 0) + pData.val;
  }

  // Roll for suffix
  if (Math.random() < rarityData.prefixChance * 0.7) {
    const suffixes = Object.keys(ITEM_SUFFIXES);
    const sName = suffixes[Math.floor(Math.random() * suffixes.length)];
    const sData = ITEM_SUFFIXES[sName];
    item.suffix = sName;
    item.suffixData = sData;
    item.n = item.n + ' ' + sName;
    item[sData.stat] = (item[sData.stat] || 0) + sData.val;
  }

  // Calculate sell value
  item.value = Math.floor((base.ilvl * 5 + (rarityData.mult * 10)) * (1 + Math.random() * 0.5));

  return item;
}

function getEquippedStats() {
  const stats = { atk: 0, def: 0, str: 0, dex: 0, con: 0, int: 0, wis: 0, cha: 0,
                  fireDmg: 0, iceDmg: 0, lightDmg: 0, voidDmg: 0,
                  fireRes: 0, iceRes: 0, lightRes: 0, voidRes: 0,
                  lifeSteal: 0, critChance: 0, mpRegen: 0, hpRegen: 0, goldFind: 0 };

  for (let slot in G.p.eq) {
    const item = G.p.eq[slot];
    if (!item) continue;
    for (let key in stats) {
      if (item[key]) stats[key] += item[key];
    }
  }
  return stats;
}

function getTotalAC() {
  const eqStats = getEquippedStats();
  const dexMod = DICE.abilityMod(G.p.stats.dex + eqStats.dex);
  let baseAC = 10 + dexMod;
  if (G.p.eq.armor) {
    baseAC = 10 + Math.min(dexMod, 2) + (G.p.eq.armor.def || 0);
  }
  baseAC += eqStats.def;
  const shieldBonus = G.p.buffs.reduce((s, b) => s + (b.def || 0), 0);
  return baseAC + shieldBonus;
}

function equipItem(invIndex) {
  const item = G.p.inv[invIndex];
  if (!item || !item.slot) return;

  const slot = item.slot;
  const slotKey = slot === 'ring' ? (G.p.eq.ring1 ? 'ring2' : 'ring1') : slot;

  // Unequip current
  const old = G.p.eq[slotKey];
  if (old) {
    addI(old);
    lg('Unequipped: ' + old.n);
  }

  // Equip new
  G.p.eq[slotKey] = { ...item };
  G.p.inv.splice(invIndex, 1);
  lg('Equipped: ' + item.n + ' (' + ITEM_RARITY[item.r].name + ')');

  // Recalculate derived stats
  const eqStats = getEquippedStats();
  G.p.mhp = 80 + (G.p.lvl - 1) * 10 + (eqStats.con * 2);
  G.p.mmp = 120 + (G.p.lvl - 1) * 15 + (eqStats.int * 2);
  G.p.hp = Math.min(G.p.hp, G.p.mhp);
  G.p.mp = Math.min(G.p.mp, G.p.mmp);

  render();
}

function unequipItem(slot) {
  const item = G.p.eq[slot];
  if (!item) return;
  addI({ ...item });
  lg('Unequipped: ' + item.n);
  G.p.eq[slot] = null;

  // Recalculate
  const eqStats = getEquippedStats();
  G.p.mhp = 80 + (G.p.lvl - 1) * 10 + (eqStats.con * 2);
  G.p.mmp = 120 + (G.p.lvl - 1) * 15 + (eqStats.int * 2);
  G.p.hp = Math.min(G.p.hp, G.p.mhp);
  G.p.mp = Math.min(G.p.mp, G.p.mmp);

  render();
}

function addLootFromCombat(zoneName) {
  const zone = G.zones.find(z => z.n === zoneName);
  if (!zone) return;

  const slots = ['weapon', 'armor', 'head', 'hands', 'feet', 'ring', 'amulet'];
  const slot = slots[Math.floor(Math.random() * slots.length)];
  const item = generateItem(slot, zone.lv);

  if (item) {
    addI(item);
    lg('🎁 Loot: ' + item.n + ' (' + ITEM_RARITY[item.r].name + ')!');
  }
}

const DICE = {
  d(sides) { return Math.floor(Math.random() * sides) + 1; },
  
  roll(count, sides) {
    let sum = 0;
    for (let i = 0; i < count; i++) sum += this.d(sides);
    return sum;
  },
  
  parse(expr) {
    const match = expr.match(/^(\d+)d(\d+)(?:([+-])(\d+))?$/);
    if (!match) return { total: 0, rolls: [] };
    const count = parseInt(match[1]);
    const sides = parseInt(match[2]);
    const modifier = match[3] ? (match[3] === '+' ? 1 : -1) * parseInt(match[4]) : 0;
    const rolls = [];
    for (let i = 0; i < count; i++) rolls.push(this.d(sides));
    const total = rolls.reduce((a, b) => a + b, 0) + modifier;
    return { total, rolls, modifier, expr };
  },
  
  d20(type = 'normal') {
    if (type === 'advantage') {
      const r1 = this.d(20), r2 = this.d(20);
      return { 
        roll: Math.max(r1, r2), 
        rolls: [r1, r2], 
        type,
        nat20: r1 === 20 || r2 === 20,
        nat1: r1 === 1 && r2 === 1
      };
    }
    if (type === 'disadvantage') {
      const r1 = this.d(20), r2 = this.d(20);
      return { 
        roll: Math.min(r1, r2), 
        rolls: [r1, r2], 
        type,
        nat20: r1 === 20 && r2 === 20,
        nat1: r1 === 1 || r2 === 1
      };
    }
    const r = this.d(20);
    return { roll: r, rolls: [r], type, nat20: r === 20, nat1: r === 1 };
  },
  
  proficiencyBonus(level) {
    return Math.floor((level - 1) / 4) + 2;
  },
  
  abilityMod(score) {
    return Math.floor((score - 10) / 2);
  },
  
  attackRoll({ attackerLevel = 1, abilityScore = 10, proficiency = false, bonus = 0, targetAC = 10, advantage = 'normal' }) {
    const d20Result = this.d20(advantage);
    const profBonus = proficiency ? this.proficiencyBonus(attackerLevel) : 0;
    const abilityBonus = this.abilityMod(abilityScore);
    const total = d20Result.roll + profBonus + abilityBonus + bonus;
    
    const isCrit = d20Result.nat20;
    const isFumble = d20Result.nat1 && !d20Result.nat20;
    
    let hit = false;
    if (isCrit) hit = true;
    else if (isFumble) hit = false;
    else hit = total >= targetAC;
    
    const margin = total - targetAC;
    
    return {
      d20: d20Result,
      profBonus,
      abilityBonus,
      bonus,
      total,
      targetAC,
      hit,
      isCrit,
      isFumble,
      margin,
      breakdown: `d20(${d20Result.roll}) + PROF(${profBonus}) + MOD(${abilityBonus >= 0 ? '+' : ''}${abilityBonus})${bonus ? ' + BONUS(' + bonus + ')' : ''} = ${total}`
    };
  },
  
  damageRoll({ diceExpr = '1d6', abilityScore = 10, isCrit = false, bonus = 0 }) {
    let parsed = this.parse(diceExpr);
    
    if (isCrit) {
      const match = diceExpr.match(/^(\d+)d(\d+)/);
      if (match) {
        const doubledExpr = diceExpr.replace(/^(\d+)/, m => parseInt(m) * 2);
        parsed = this.parse(doubledExpr);
      }
    }
    
    const abilityBonus = this.abilityMod(abilityScore);
    let total = parsed.total + abilityBonus + bonus;
    
    return {
      rolls: parsed.rolls,
      total: Math.max(0, total),
      isCrit,
      abilityBonus,
      bonus,
      breakdown: `${diceExpr}${isCrit ? ' (doubled)' : ''} = [${parsed.rolls.join(', ')}] + ${abilityBonus >= 0 ? '+' : ''}${abilityBonus}${bonus ? ' + ' + bonus : ''} = ${Math.max(0, total)}`
    };
  },
  
  savingThrow({ abilityScore = 10, proficiency = false, level = 1, bonus = 0, dc = 10, advantage = 'normal' }) {
    const d20Result = this.d20(advantage);
    const profBonus = proficiency ? this.proficiencyBonus(level) : 0;
    const abilityBonus = this.abilityMod(abilityScore);
    const total = d20Result.roll + profBonus + abilityBonus + bonus;
    
    const success = d20Result.nat20 || (!d20Result.nat1 && total >= dc);
    const margin = total - dc;
    
    return {
      d20: d20Result,
      profBonus,
      abilityBonus,
      total,
      dc,
      success,
      margin,
      breakdown: `d20(${d20Result.roll}) + PROF(${profBonus}) + MOD(${abilityBonus >= 0 ? '+' : ''}${abilityBonus}) = ${total} vs DC ${dc}`
    };
  },
  
  deathSave() {
    const roll = this.d(20);
    if (roll === 20) return { roll, result: 'revive', hp: 1, flavor: "⚡ A surge of will! You cling to life with 1 HP!" };
    if (roll === 1) return { roll, result: 'double_fail', failures: 2, flavor: "💀 The darkness deepens... two steps closer to oblivion." };
    if (roll >= 10) return { roll, result: 'success', flavor: `🩹 You hold on... (${roll})` };
    return { roll, result: 'fail', flavor: `🕳️ The void pulls... (${roll})` };
  }
};

window.DICE = DICE;

// --- Backward compatibility ---
function rd(sides) { return DICE.d(sides); }
function rdc(count, sides) { return DICE.roll(count, sides); }
function r20() { return DICE.d20('normal').roll; }

function pd(ds, bonus) {
  if (!ds) return bonus || 0;
  const parsed = DICE.parse(ds);
  if (parsed.total === 0 && parsed.rolls.length === 0) return bonus || 0;
  return parsed.total + (bonus || 0);
}







function checkAchievements() {
  let newUnlocks = 0;
  for (let ach of G.achievements) {
    if (ach.done) continue;
    if (ach.secret && !ach.revealed) continue;

    let earned = false;
    switch (ach.t) {
      case 'kills':
        if (G.p.kills >= ach.need) earned = true;
        break;
      case 'boss':
        if ((G.p.bossKills || 0) >= ach.need) earned = true;
        break;
      case 'boss_specific':
        if (G.bestiary[ach.target] && G.bestiary[ach.target].kills >= ach.need) earned = true;
        break;
      case 'level':
        if (G.p.lvl >= ach.need) earned = true;
        break;
      case 'quests':
        if (G.p.quests >= ach.need) earned = true;
        break;
      case 'affinity':
        if (G.affinity[ach.target] && G.affinity[ach.target].val >= ach.need) earned = true;
        break;
      case 'party':
        const unlockedCount = G.party.filter(p => p.on || p.hp > 0).length;
        if (unlockedCount >= ach.need) earned = true;
        break;
      case 'craft':
        if ((G.p.crafts || 0) >= ach.need) earned = true;
        break;
      case 'gold':
        if (G.p.gold >= ach.need) earned = true;
        break;
      case 'survivor':
        if (G.p.survivedCritical || false) earned = true;
        break;
      case 'focus':
        if (G.p.fstreak >= ach.need) earned = true;
        break;
    }

    if (earned) {
      ach.done = true;
      G.p.xp += ach.rw.xp;
      G.p.gold += ach.rw.g;
      lg('🏆 ACHIEVEMENT UNLOCKED: ' + ach.n + '! ' + ach.icon);
      if (ach.secret) {
        lg('   ' + ach.d);
        ach.revealed = true;
      }
      lvlup();
      newUnlocks++;
    }
  }
  return newUnlocks;
}

function revealSecretAchievements() {
  for (let ach of G.achievements) {
    if (ach.secret && !ach.revealed && !ach.done) {
      if (ach.t === 'affinity' && G.affinity[ach.target] && G.affinity[ach.target].val >= ach.need * 0.5) {
        ach.revealed = true;
        lg('🔓 Secret achievement hint unlocked...');
      }
      if (ach.t === 'boss_specific' && G.p.lvl >= 8) {
        ach.revealed = true;
        lg('🔓 Secret achievement hint unlocked...');
      }
    }
  }
}

function updateAffinity(partyMemberName, amount) {
  if (!G.affinity[partyMemberName]) return;
  G.affinity[partyMemberName].val = Math.max(0, Math.min(G.affinity[partyMemberName].max, G.affinity[partyMemberName].val + amount));
  G.affinity[partyMemberName].lastInteract = Date.now();
  if (amount > 0) {
    lg('💕 Affinity with ' + partyMemberName + ' +' + amount + ' (' + G.affinity[partyMemberName].val + '/' + G.affinity[partyMemberName].max + ')');
  }
  checkAchievements();
  revealSecretAchievements();
  checkAffinityDecay();
}

function checkAffinityDecay() {
  const now = Date.now();
  for (let name in G.affinity) {
    const aff = G.affinity[name];
    const hoursSince = (now - aff.lastInteract) / (1000 * 60 * 60);
    if (hoursSince > 24) {
      const decay = Math.floor(hoursSince / 24) * aff.decayRate * 10;
      aff.val = Math.max(0, aff.val - decay);
      if (decay > 0) {
        lg('💔 ' + name + ' feels neglected. Affinity -' + Math.floor(decay) + ' (' + aff.val + ')');
      }
      aff.lastInteract = now;
    }
  }
}

}

function buyFromNPC(npcName, itemIdx) {
  const npc = G.npcs.find(n => n.n === npcName);
  if (!npc || !npc.unlocked || npc.t !== 'trader') return;
  const item = npc.stock[itemIdx];
  if (!item) return;
  if (G.p.gold < item.price) {
    lg('❌ Not enough gold! ' + item.n + ' costs ' + item.price + 'G.');
    return;
  }
  G.p.gold -= item.price;
  // Map type to equipment slot
  const slotMap = { 'wep': 'weapon', 'arm': 'armor', 'acc': 'amulet' };
  const boughtItem = { 
    n: item.n, 
    t: item.t, 
    slot: slotMap[item.t] || item.t,
    q: item.q || 1, 
    r: item.r,
    ilvl: item.ilvl || 1,
    d: item.d || 'A purchased item.'
  };
  // Copy all stat properties
  const statProps = ['atk', 'def', 'str', 'dex', 'con', 'int', 'wis', 'cha', 
                     'fireDmg', 'iceDmg', 'lightDmg', 'voidDmg',
                     'fireRes', 'iceRes', 'lightRes', 'voidRes',
                     'lifeSteal', 'critChance', 'mpRegen', 'hpRegen', 'goldFind'];
  for (let prop of statProps) {
    if (item[prop] !== undefined) boughtItem[prop] = item[prop];
  }
  addI(boughtItem);
  npc.visitCount++;
  lg('🧳 Bought ' + item.n + ' from ' + npc.n + ' for ' + item.price + 'G!');
  if (npc.visitCount === 1) {
    lg('   ' + npc.n + ': "Pleasure doing business, mage."');
  }
  render();
}

function getDayNumber() {
  return Math.floor(Date.now() / (1000 * 60 * 60 * 24));
}

function refreshBounties() {
  const today = getDayNumber();
  let refreshed = false;
  for (let b of G.bounties) {
    if (b.done && b.refreshDay !== today) {
      b.done = false;
      b.c = 0;
      b.refreshDay = today;
      refreshed = true;
    }
  }
  if (refreshed) {
    lg('📋 New bounties available!');
  }
}

function checkStoryline() {
  for (let s of G.storyline) {
    if (s.done) continue;
    if (!s.unlocked) {
      // Check if previous chapter is done
      const prev = G.storyline.find(ch => ch.chapter === s.chapter - 1);
      if (!prev || prev.done) {
        s.unlocked = true;
        lg('📖 Storyline unlocked: Chapter ' + s.chapter + ' - ' + s.n + '!');
      }
    }
    if (s.unlocked && G.p.lvl >= s.need) {
      s.c = s.need;
      s.done = true;
      G.p.xp += s.rw.xp;
      G.p.gold += s.rw.g;
      G.p.quests++;
      lg('📖 Storyline complete: ' + s.n + '! +' + s.rw.xp + 'XP +' + s.rw.g + 'G');
      lvlup();
    }
  }
}

function checkBountyKill(enemyName) {
  for (let b of G.bounties) {
    if (b.done) continue;
    if (b.t === 'kill_specific' && enemyName === b.target) {
      b.c++;
      if (b.c >= b.need) {
        b.done = true;
        b.refreshDay = getDayNumber();
        G.p.xp += b.rw.xp;
        G.p.gold += b.rw.g;
        G.p.quests++;
        lg('💰 Bounty complete: ' + b.n + '! +' + b.rw.xp + 'XP +' + b.rw.g + 'G');
        lvlup();
      }
    }
  }
}

function getWeaknessMultiplier(spellElem, enemyElem) {
  if (!spellElem || !enemyElem || enemyElem === 'none') return 1;
  // Fire beats Ice, Ice beats Fire
  if (spellElem === 'fire' && enemyElem === 'ice') return 1.5;
  if (spellElem === 'ice' && enemyElem === 'fire') return 1.5;
  // Lightning beats Void
  if (spellElem === 'lightning' && enemyElem === 'void') return 1.5;
  // Arcane beats Void
  if (spellElem === 'arcane' && enemyElem === 'void') return 1.3;
  // Same element = reduced damage
  if (spellElem === enemyElem) return 0.5;
  return 1;
}


function getActiveSynergies() {
  const active = G.party.filter(p => p.on && p.hp > 0).map(p => p.n);
  active.push('San');
  const synergies = [];
  for (let syn of G.partySynergies) {
    const allPresent = syn.members.every(m => active.includes(m));
    if (allPresent) synergies.push(syn);
  }
  return synergies;
}

function getSynergyBonus(type) {
  const synergies = getActiveSynergies();
  let bonus = 0;
  for (let syn of synergies) {
    if (syn.bonus[type]) bonus += syn.bonus[type];
  }
  return bonus;
}

function getSynergyDesc() {
  const synergies = getActiveSynergies();
  if (synergies.length === 0) return null;
  return synergies.map(s => s.icon + ' ' + s.name).join(' · ');
}

function applySynergyDamage(dmg, type) {
  const spellBonus = getSynergyBonus('spellDmgPct');
  if (type === 'spell' && spellBonus > 0) {
    dmg = Math.floor(dmg * (1 + spellBonus));
  }
  return dmg;
}

function applySynergyDefense(dmg) {
  const dmgRed = getSynergyBonus('dmgRed');
  if (dmgRed > 0) {
    dmg = Math.floor(dmg * (1 - dmgRed));
  }
  return Math.max(1, dmg);
}

function getSynergyCritBonus() {
  return getSynergyBonus('critPct');
}

function getSynergyGoldBonus() {
  return getSynergyBonus('goldPct');
}

function getSynergyHealBonus() {
  return getSynergyBonus('healPct');
}

function getTotalCritChance() {
  // Base 5% + 2% per DEX point + proficiency scaling + synergy bonuses
  const baseCrit = 0.05;
  const dexBonus = G.p.stats.dex * 0.02;
  const profBonus = DICE.proficiencyBonus(G.p.lvl) * 0.01; // +1% per proficiency point
  const synergyBonus = getSynergyCritBonus();
  return Math.min(0.75, baseCrit + dexBonus + profBonus + synergyBonus);
}

function isImmune(enemyName, spellElem) {
  if (!spellElem) return false;
  const fireMobs = ['Fire Imp', 'Lava Slug', 'Ash Wraith'];
  const iceMobs = ['Ice Elemental', 'Frost Wolf', 'Frozen Knight'];
  if (spellElem === 'fire' && fireMobs.includes(enemyName)) return true;
  if (spellElem === 'ice' && iceMobs.includes(enemyName)) return true;
  return false;
}

function getAttackAdvantage(attacker, target, isSpell = false) {
  let advantage = 'normal';
  let reasons = [];
  
  if (attacker === G.p && G.p.buffs.some(b => b.n === 'True Strike')) {
    advantage = 'advantage';
    reasons.push('True Strike');
  }
  
  if (isSpell && G.party.some(p => p.on && p.n === 'Senedra')) {
    if (Math.random() < 0.15) {
      advantage = 'advantage';
      reasons.push("Senedra's scouting");
    }
  }
  
  if (G.p.buffs.some(b => b.n === 'Blinded')) {
    advantage = 'disadvantage';
    reasons.push('Blinded');
  }
  
  if (target && target.n && target.n.includes('Frost') && Math.random() < 0.1) {
    if (advantage === 'normal') {
      advantage = 'disadvantage';
      reasons.push('Freezing fingers');
    }
  }
  
  return { advantage, reasons };
}

function getDamageFlavor(damage, isCrit) {
  if (isCrit) {
    if (damage >= 30) return '💥 DEVASTATING CRITICAL!';
    if (damage >= 20) return '💥 MASSIVE CRITICAL!';
    return '💥 CRITICAL!';
  }
  if (damage >= 25) return '💀 OBLITERATING!';
  if (damage >= 15) return '🔥 CRUSHING!';
  if (damage >= 10) return '⚔️ Solid hit!';
  if (damage >= 5) return '🎯 Good hit.';
  return '💨 Glancing blow.';
}

function trackBestiary(enemy) {
  if (!G.bestiary[enemy.n]) {
    G.bestiary[enemy.n] = {
      kills: 0,
      firstSeen: Date.now(),
      elem: enemy.elem || 'none',
      mhp: enemy.mhp,
      atk: enemy.atk,
      def: enemy.def
    };
  }
  G.bestiary[enemy.n].kills++;
  G.bestiary[enemy.n].lastSeen = Date.now();
}

function doPhysicalAttack(target) {
  const advInfo = getAttackAdvantage(G.p, target, false);
  const eqStats = getEquippedStats();
  const attackResult = DICE.attackRoll({
    attackerLevel: G.p.lvl,
    abilityScore: G.p.stats.str + eqStats.str,
    proficiency: false,
    bonus: Math.floor((G.p.eq.weapon?.atk || 0) / 2) + eqStats.atk,
    targetAC: getEnemyAC(target),
    advantage: advInfo.advantage
  });
  
  lg('🎲 Staff Swing: ' + attackResult.d20.roll + ' vs AC ' + attackResult.targetAC + ' = ' + (attackResult.hit ? 'HIT' : 'MISS'));
  
  if (!attackResult.hit) {
    if (attackResult.isFumble) lg('   💀 CRITICAL MISS! You stumble wildly!');
    else if (attackResult.margin >= -2) lg('   ❌ Close! The enemy deflects at the last moment.');
    else lg('   ❌ Solid defense. You\'ll need a better angle.');
    return false;
  }
  
  const damageResult = DICE.damageRoll({
    diceExpr: '1d4',
    abilityScore: G.p.stats.str,
    isCrit: attackResult.isCrit,
    bonus: G.p.eq.weapon ? Math.floor(G.p.eq.weapon.atk / 2) : 0
  });
  
  let finalDamage = Math.max(1, damageResult.total - Math.floor((target.def || 0) / 2));
  target.hp -= finalDamage;
  
  const dmgFlavor = getDamageFlavor(finalDamage, attackResult.isCrit);
  lg(dmgFlavor + ' Staff swing hits ' + target.n + ' for ' + finalDamage + '!');
  
  if (attackResult.isCrit) {
    lg('   🎲 ' + damageResult.breakdown);
  }
  
  if (target.hp <= 0) {
    target.hp = 0;
    lg('💀 ' + target.n + ' falls to your staff!');
    checkBountyKill(target.n);
    trackBestiary(target);
  }
  
  return true;
}

function doPartyAttack(member) {
  const aliveEnemies = G.cbt.en.filter(e => e.hp > 0);
  if (aliveEnemies.length === 0) return;
  
  const target = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
  const abilityScore = member.r === 'Rogue' || member.r === 'Ranger' 
    ? member.spd * 2 : member.atk * 2;
  
  const attackResult = DICE.attackRoll({
    attackerLevel: G.p.lvl,
    abilityScore: abilityScore,
    proficiency: true,
    bonus: 0,
    targetAC: getEnemyAC(target),
    advantage: 'normal'
  });
  
  if (!attackResult.hit) {
    lg('❌ ' + member.n + ' misses ' + target.n + ' (' + attackResult.d20.roll + ')');
    return;
  }
  
  const damageResult = DICE.damageRoll({
    diceExpr: '1d6',
    abilityScore: abilityScore,
    isCrit: attackResult.isCrit
  });
  
  let finalDamage = Math.max(1, damageResult.total - Math.floor((target.def || 0) / 3));
  target.hp -= finalDamage;
  
  const critTag = attackResult.isCrit ? ' 💥CRIT' : '';
  lg('⚔️ ' + member.n + ' hits ' + target.n + ' for ' + finalDamage + critTag);
  
  if (target.hp <= 0) {
    target.hp = 0;
    lg('💀 ' + target.n + ' falls!');
    checkBountyKill(target.n);
    trackBestiary(target);
  }
}

function doEnemyAttack(enemy) {
  if (enemy.hp <= 0) return;
  
  if (enemy.status && enemy.status.length > 0) {
    for (let s of enemy.status) {
      if (s.type === 'burn' && s.dmg) {
        enemy.hp -= s.dmg;
        lg('🔥 ' + enemy.n + ' takes ' + s.dmg + ' burn damage!');
      }
      if (s.type === 'poison' && s.dmg) {
        enemy.hp -= s.dmg;
        lg('☠️ ' + enemy.n + ' takes ' + s.dmg + ' poison damage!');
      }
      if (s.type === 'shock') {
        lg('⚡ ' + enemy.n + ' is shocked and skips this turn!');
      }
      s.turns--;
    }
    enemy.status = enemy.status.filter(s => s.turns > 0);
    
    if (enemy.hp <= 0) {
      enemy.hp = 0;
      lg('💀 ' + enemy.n + ' falls to status damage!');
      checkBountyKill(enemy.n);
      trackBestiary(enemy);
      return;
    }
    if (enemy.status.find(s => s.type === 'shock')) return;
  }
  
  let target = G.p;
  if (Math.random() > 0.5) {
    const activeParty = G.party.filter(p => p.on && p.hp > 0);
    if (activeParty.length > 0) {
      target = activeParty[Math.floor(Math.random() * activeParty.length)];
    }
  }
  
  const targetAC = target === G.p ? getPlayerAC() : 10 + Math.floor((target.def || 0) / 2);
  const attackResult = DICE.attackRoll({
    attackerLevel: G.zones.find(z => z.en.includes(enemy.n))?.lv || 1,
    abilityScore: enemy.atk * 2,
    proficiency: true,
    bonus: 0,
    targetAC: targetAC,
    advantage: 'normal'
  });
  
  if (!attackResult.hit) {
    lg('❌ ' + enemy.n + ' misses ' + (target.n || 'you') + '!');
    return;
  }
  
  const damageResult = DICE.damageRoll({
    diceExpr: '1d6',
    abilityScore: enemy.atk * 2,
    isCrit: attackResult.isCrit
  });
  
  let finalDamage = damageResult.total;
  const targetDef = target === G.p 
    ? (G.p.eq.armor ? G.p.eq.armor.def : 0) + G.p.buffs.reduce((s, b) => s + (b.def || 0), 0)
    : (target.def || 0);
  
  finalDamage = Math.max(1, finalDamage - Math.floor(targetDef / 2));
  finalDamage = applySynergyDefense(finalDamage);
  
  target.hp -= finalDamage;
  
  const critTag = attackResult.isCrit ? ' 💥CRIT' : '';
  lg('🗡️ ' + enemy.n + ' hits ' + (target.n || 'you') + ' for ' + finalDamage + critTag);
  
  if (target.hp <= 0) {
    if (target !== G.p && target.passive === 'guardian_spirit') {
      target.hp = 1;
      lg('✨ ' + target.n + "'s Guardian Spirit shines! She endures at 1 HP!");
    } else {
      target.hp = 0;
      lg('💀 ' + (target.n || 'You') + ' fall unconscious!');
    }
  }
}

function handleBossMechanics() {
  for (let e of G.cbt.en) {
    if (e.hp <= 0 || !e.mechanic) continue;
    
    G.cbt.turn = G.cbt.turn || 0;
    
    switch (e.mechanic) {
      case 'rampage':
        if (G.cbt.turn >= e.rampageTurn) {
          lg('🔥 ' + e.n + ' ENRAGES! All party members take ' + e.rampageDmg + ' damage!');
          G.p.hp = Math.max(1, G.p.hp - e.rampageDmg);
          for (let p of G.party) { if (p.on) p.hp = Math.max(1, p.hp - e.rampageDmg); }
        }
        break;
      case 'resurrect':
        if (e.hp <= 0 && e.resurrectCount > 0) {
          e.resurrectCount--;
          e.hp = Math.floor(e.mhp * 0.5);
          lg('💀 ' + e.n + ' RESURRECTS! HP restored to ' + e.hp + '! (' + e.resurrectCount + ' lives left)');
        }
        break;
      case 'phase':
        const phaseThreshold = e.mhp - (e.currentPhase * e.phaseHp);
        if (e.hp <= phaseThreshold && e.currentPhase < e.phases) {
          e.currentPhase++;
          lg('💎 ' + e.n + ' shifts to PHASE ' + e.currentPhase + '! Defenses change!');
          e.def += 3;
          e.atk += 2;
        }
        break;
      case 'inferno':
        if (G.cbt.turn >= e.infernoTurn) {
          lg('🔥 ' + e.n + ' unleashes INFERNO! Party takes ' + e.infernoDmg + ' damage!');
          G.p.hp = Math.max(1, G.p.hp - e.infernoDmg);
          for (let p of G.party) { if (p.on) p.hp = Math.max(1, p.hp - e.infernoDmg); }
        }
        break;
      case 'lightning_rod':
        if (G.cbt.turn > 0 && G.cbt.turn % e.rodTurns === 0) {
          const targets = [G.p, ...G.party.filter(p => p.on && p.hp > 0)];
          const weakest = targets.reduce((a, b) => (a.hp / (a.mhp || a.hp)) < (b.hp / (b.mhp || b.hp)) ? a : b);
          const rodDmg = Math.floor(e.atk * 1.5);
          weakest.hp = Math.max(1, weakest.hp - rodDmg);
          lg('⚡ Lightning strikes ' + (weakest.n || 'you') + ' for ' + rodDmg + '!');
        }
        break;
      case 'freeze':
        if (Math.random() < e.freezeChance) {
          const targets = [G.p, ...G.party.filter(p => p.on && p.hp > 0)];
          const target = targets[Math.floor(Math.random() * targets.length)];
          target.frozen = true;
          lg('❄️ ' + e.n + ' freezes ' + (target.n || 'you') + '! Skip next turn!');
        }
        break;
      case 'devour':
        if (G.cbt.turn >= e.devourTurn) {
          const targets = G.party.filter(p => p.on && p.hp > 0);
          if (targets.length > 0) {
            const victim = targets[Math.floor(Math.random() * targets.length)];
            const saveResult = DICE.savingThrow({
              abilityScore: victim.spd * 2,
              proficiency: false,
              level: G.p.lvl,
              dc: 15
            });
            lg('🌑 ' + e.n + ' attempts to DEVOUR ' + victim.n + '!');
            lg('   ' + victim.n + ' rolls ' + saveResult.d20.roll + ' vs DC ' + saveResult.dc + ' = ' + (saveResult.success ? 'SAVED!' : 'FAILED!'));
            
            if (!saveResult.success) {
              victim.hp = 0;
              lg('💀 ' + victim.n + ' has been devoured!');
            } else {
              lg('✨ ' + victim.n + ' narrowly escapes the maw!');
            }
          }
        }
        break;
      case 'apocalypse':
        if (G.cbt.turn >= e.apocalypseTurn) {
          lg('💥 ' + e.n + ' uses APOCALYPSE! Total party wipe!');
          G.p.hp = 1;
          for (let p of G.party) { if (p.on) p.hp = 0; }
        }
        break;
    }
  }
}

function handleZoneHazards() {
  if (!G.cbt.on || G.cbt.en.length === 0 || !G.cbt.en.some(e => e.hp > 0)) return;
  
  const zone = G.zones.find(z => z.en.includes(G.cbt.en[0]?.n));
  if (!zone || !G.zoneHazards[zone.n]) return;
  
  const hazard = G.zoneHazards[zone.n];
  if (Math.random() >= hazard.chance) return;
  
  lg('🌋 HAZARD: ' + hazard.msg);
  
  switch (hazard.type) {
    case 'damage':
      const saveResult = DICE.savingThrow({
        abilityScore: G.p.stats.con,
        proficiency: false,
        level: G.p.lvl,
        dc: 12
      });
      
      let hazardDmg = hazard.dmg;
      if (saveResult.success) {
        hazardDmg = Math.floor(hazardDmg / 2);
        lg('   🛡️ You dive for cover! Half damage!');
      }
      
      G.p.hp = Math.max(1, G.p.hp - hazardDmg);
      lg('   🔥 ' + G.p.name + ' takes ' + hazardDmg + ' ' + hazard.elem + ' damage!');
      
      for (let p of G.party) {
        if (p.on && p.hp > 0) {
          const partySave = DICE.savingThrow({
            abilityScore: p.con || 10,
            proficiency: false,
            level: G.p.lvl,
            dc: 12
          });
          let partyDmg = hazard.dmg;
          if (partySave.success) partyDmg = Math.floor(partyDmg / 2);
          p.hp = Math.max(1, p.hp - partyDmg);
          lg('   🔥 ' + p.n + ' takes ' + partyDmg + ' ' + hazard.elem + ' damage!');
        }
      }
      break;
    case 'freeze':
      const targets = [G.p, ...G.party.filter(p => p.on && p.hp > 0)];
      const target = targets[Math.floor(Math.random() * targets.length)];
      target.frozen = true;
      lg('   ❄️ ' + (target.n || target.name) + ' is frozen by the ' + hazard.name + '! Skip next turn!');
      break;
    case 'mana_drain':
      G.p.mp = Math.max(0, G.p.mp - hazard.drain);
      lg('   🌑 ' + G.p.name + ' loses ' + hazard.drain + ' MP to void corruption!');
      break;
  }
}

function finishPlayerTurn() {
  for (let p of G.party) {
    if (p.on && p.hp > 0) doPartyAttack(p);
  }
  
  eturn();
  
  if (G.p.hp <= 1 && G.p.hp > 0) {
    G.cbt.autoFlee = true;
  }
  
  if (G.cbt.en.every(e => e.hp <= 0)) {
    handleVictory();
    return;
  }
  
  if (G.p.hp <= 0) {
    handleDefeat();
    return;
  }
  
  G.cbt.turn++;
  render();
}

function handleVictory() {
  const txp = G.cbt.en.reduce((s, e) => s + e.xp, 0);
  let tg2 = G.cbt.en.reduce((s, e) => s + e.g, 0);
  
  if (G.party[1].on) tg2 = Math.floor(tg2 * 1.2);
  const goldBonus = getSynergyGoldBonus();
  if (goldBonus > 0) {
    tg2 = Math.floor(tg2 * (1 + goldBonus));
    lg('💰 Synergy bonus: +' + Math.floor(goldBonus * 100) + '% gold!');
  }
  
  G.p.xp += txp;
  G.p.gold += tg2;
  G.p.kills += G.cbt.en.length;
  if (G.currentBoss) { G.p.bossKills = (G.p.bossKills || 0) + 1; }
  if (G.p.hp === 1) { G.p.survivedCritical = true; }
  checkAchievements();
  
  lg('🎉 VICTORY! +' + txp + ' XP, +' + tg2 + ' Gold!');
  triggerSoelCommentary('combat_win');
  
  const aisyahQuest = G.quests.find(q => q.t === 'aisyah_battle' && !q.done);
  if (aisyahQuest && G.party.find(p => p.on && p.n === 'Aisyah')) {
    aisyahQuest.c += G.cbt.en.length;
    if (aisyahQuest.c >= aisyahQuest.need) checkQ();
  }
  
  const joelQuest = G.quests.find(q => q.t === 'joel_battle' && !q.done);
  if (joelQuest && G.party.find(p => p.on && p.n === 'Joel')) {
    joelQuest.c += G.cbt.en.length;
    if (joelQuest.c >= joelQuest.need) checkQ();
  }
  
  for (let p of G.party) {
    if (p.on && p.hp > 0) updateAffinity(p.n, 1);
  }
  
  const z = G.zones.find(z => z.en.includes(G.cbt.en[0]?.n));
  if (z) {
    // Old material loot
    const l = z.loot[Math.floor(Math.random() * z.loot.length)];
    addI({ n: l, t: 'mat', q: 1, r: 'common' });
    lg('🎁 Found: ' + l);

    // New equipment loot (50% chance)
    if (Math.random() < 0.5) {
      addLootFromCombat(z.n);
    }
    
    const campSite = G.rest.sites.find(s => s.zone === z.n && s.type === 'camp');
    const tavernSite = G.rest.sites.find(s => s.zone === z.n && s.type === 'tavern');
    if (campSite && !campSite.unlocked) {
      campSite.unlocked = true;
      lg('🏕️ Campsite discovered in ' + z.n + '!');
    }
    if (tavernSite && !tavernSite.unlocked && G.p.lvl >= tavernSite.zoneLv) {
      tavernSite.unlocked = true;
      lg('🍺 Tavern discovered: ' + tavernSite.name + '!');
    }
  }
  
  lvlup();
  checkQ();
  
  G.currentBoss = null;
  G.cbt.autoCombat = false;
  G.cbt.on = false;
  G.state = 'explore';
  render();
}

function handleDefeat() {
  lg('💀 You have fallen! Rolling death saves...');
  
  let successes = 0;
  let failures = 0;
  
  while (successes < 3 && failures < 3) {
    const deathResult = DICE.deathSave();
    lg('   ' + deathResult.flavor);
    
    if (deathResult.result === 'revive') {
      G.p.hp = 1;
      lg('⚡ MIRACLE! You spring back to life with 1 HP!');
      G.cbt.on = false;
      G.state = 'menu';
      render();
      return;
    }
    
    if (deathResult.result === 'success') successes++;
    else if (deathResult.result === 'fail') failures++;
    else if (deathResult.result === 'double_fail') failures += 2;
  }
  
  if (failures >= 3) {
    lg('💀 The darkness claims you...');
    lg('   (You retreat with 1 HP. Rest to recover.)');
  } else {
    lg('🩹 You stabilize at 1 HP, unconscious but alive.');
  }
  
  G.p.hp = 1;
  for (let p of G.party) {
    if (p.hp <= 0) {
      p.hp = 1;
      p.on = true;
    }
  }
  
  G.cbt.autoCombat = false;
  G.cbt.on = false;
  G.state = 'menu';
  render();
}

function pa(si, ti) {
  const isBasicAttack = si === -1;
  const sk = isBasicAttack 
    ? { n: 'Staff Swing', c: 0, dmg: '1d4', elem: 'none', buff: false } 
    : G.p.skills[si];
  const tg = G.cbt.en[ti];
  
  if (!tg || tg.hp <= 0) return;
  
  if (G.p.mp < sk.c) {
    lg('💨 Not enough MP! San swings their staff instead!');
    doPhysicalAttack(tg);
    finishPlayerTurn();
    return;
  }
  
  G.p.mp -= sk.c;
  
  if (sk.buff) {
    if (sk.n === 'Frost Shield') {
      G.p.buffs.push({ n: 'Frost Shield', t: 3, def: 5 });
      lg('🛡️ Frost Shield! AC +5 for 3 turns.');
    } else if (sk.n === 'Mana Surge') {
      G.p.mp = Math.min(G.p.mmp, G.p.mp + 20);
      lg('💧 Mana Surge! Restored 20 MP.');
    }
    finishPlayerTurn();
    return;
  }
  
  if (isImmune(tg.n, sk.elem)) {
    lg('🛡️ ' + sk.n + ' has no effect — ' + tg.n + ' is immune to ' + sk.elem + '!');
    finishPlayerTurn();
    return;
  }
  
  const advInfo = getAttackAdvantage(G.p, tg, true);
  const eqStats2 = getEquippedStats();
  const attackResult = DICE.attackRoll({
    attackerLevel: G.p.lvl,
    abilityScore: G.p.stats.int + eqStats2.int,
    proficiency: true,
    bonus: Math.floor((G.p.eq.weapon?.atk || 0) / 2) + eqStats2.atk,
    targetAC: getEnemyAC(tg),
    advantage: advInfo.advantage
  });
  
  lg('🎲 ' + sk.n + ': ' + attackResult.d20.roll + ' vs AC ' + attackResult.targetAC + ' = ' + (attackResult.hit ? 'HIT' : 'MISS'));
  
  if (advInfo.reasons.length > 0) {
    lg('   (' + advInfo.reasons.join(', ') + ')');
  }
  
  if (attackResult.isCrit) lg('   💥 CRITICAL HIT! The gods guide your hand!');
  else if (attackResult.isFumble) lg('   💀 CRITICAL MISS! Disaster!');
  else if (!attackResult.hit) {
    if (attackResult.margin >= -2) lg('   ❌ Close! The enemy deflects at the last moment.');
    else lg('   ❌ Solid defense. You\'ll need a better angle.');
  }
  
  if (!attackResult.hit) {
    finishPlayerTurn();
    return;
  }
  
  const weakMult = getWeaknessMultiplier(sk.elem, tg.elem);
  let isCrit = attackResult.isCrit;
  
  const synergyCritBonus = getSynergyCritBonus();
  if (!isCrit && Math.random() < synergyCritBonus) {
    isCrit = true;
    lg('✨ Synergy critical! ' + sk.n + ' strikes true!');
  }
  
  const damageResult = DICE.damageRoll({
    diceExpr: sk.dmg,
    abilityScore: G.p.stats.int,
    isCrit: isCrit,
    bonus: G.p.eq.weapon ? G.p.eq.weapon.atk : 0
  });
  
  let finalDamage = damageResult.total;
  if (weakMult > 1) {
    finalDamage = Math.floor(finalDamage * weakMult);
    lg('⚡ ' + sk.elem + ' is super effective! ×' + weakMult);
  } else if (weakMult < 1) {
    finalDamage = Math.floor(finalDamage * weakMult);
    lg('⬇️ ' + sk.elem + ' is resisted! ×' + weakMult);
  }
  
  finalDamage = applySynergyDamage(finalDamage, 'spell');
  finalDamage = Math.max(1, finalDamage);
  tg.hp -= finalDamage;
  
  const dmgFlavor = getDamageFlavor(finalDamage, isCrit);
  lg(dmgFlavor + ' ' + sk.n + ' deals ' + finalDamage + ' to ' + tg.n + '!');
  
  if (isCrit) {
    lg('   🎲 ' + damageResult.breakdown);
  }
  
  if (sk.status && tg.hp > 0) {
    const statusRoll = Math.random();
    if (statusRoll < sk.status.chance) {
      const existing = tg.status.find(s => s.type === sk.status.type);
      if (!existing) {
        tg.status.push({ ...sk.status, turns: sk.status.turns });
        lg('🔥 ' + tg.n + ' is ' + sk.status.type + 'ed!');
      }
    }
  }
  
  if (tg.hp <= 0) {
    tg.hp = 0;
    lg('💀 ' + tg.n + ' is defeated!');
    checkBountyKill(tg.n);
    trackBestiary(tg);
  }
  
  finishPlayerTurn();
}

function eturn() {
  for (let e of G.cbt.en) {
    doEnemyAttack(e);
  }
  
  handleBossMechanics();
  handleZoneHazards();
  
  for (let b of G.p.buffs) b.t--;
  G.p.buffs = G.p.buffs.filter(b => b.t > 0);
  
  for (let p of G.party) { if (p.frozen) p.frozen = false; }
  if (G.p.frozen) G.p.frozen = false;
}

function getBestSkill() {
  const available = G.p.skills.filter(s => s.on && G.p.mp >= s.c && !s.buff);
  if (available.length === 0) return null;
  available.sort((a, b) => {
    const dmgA = DICE.parse(a.dmg).total || 0;
    const dmgB = DICE.parse(b.dmg).total || 0;
    return dmgB - dmgA;
  });
  return available[0];
}

function getWeakestEnemy() {
  const alive = G.cbt.en.filter(e => e.hp > 0);
  if (alive.length === 0) return null;
  alive.sort((a, b) => a.hp - b.hp);
  return alive[0];
}

function getEnemyIndex(enemy) {
  return G.cbt.en.findIndex(e => e === enemy);
}

function doAutoCombatTick() {
  if (!G.cbt.on || !G.cbt.autoCombat) return;
  
  if (G.cbt.en.every(e => e.hp <= 0)) {
    G.cbt.autoCombat = false;
    return;
  }
  
  if (G.p.hp <= 1) {
    G.cbt.autoCombat = false;
    G.cbt.autoFlee = true;
    lg('🤖 Auto-combat: HP critical! Forcing retreat...');
    return;
  }
  
  const skill = getBestSkill();
  if (!skill) {
    const manaPot = G.p.inv.find(i => i.t === 'pot' && i.eff === 'mana');
    if (manaPot && G.p.mp < 20) {
      const idx = G.p.inv.indexOf(manaPot);
      useI(idx);
      lg('🤖 Auto-combat: Used Mana Potion!');
      setTimeout(doAutoCombatTick, 800);
      return;
    }
    
    lg('🤖 Auto-combat: No MP for attacks. Passing turn...');
    for (let p of G.party) {
      if (p.on && p.hp > 0) doPartyAttack(p);
    }
    eturn();
    
    if (G.cbt.en.every(e => e.hp <= 0)) { handleVictory(); return; }
    if (G.p.hp <= 0) { handleDefeat(); return; }
    
    G.cbt.turn++;
    render();
    setTimeout(doAutoCombatTick, 1000);
    return;
  }
  
  const target = getWeakestEnemy();
  if (!target) { G.cbt.autoCombat = false; return; }
  
  const skillIdx = G.p.skills.indexOf(skill);
  const targetIdx = getEnemyIndex(target);
  G.cbt.sk = skillIdx;
  G.cbt.tg = targetIdx;
  
  lg('🤖 Auto-combat: ' + skill.n + ' → ' + target.n);
  pa(skillIdx, targetIdx);
  
  if (!G.cbt.on) { G.cbt.autoCombat = false; return; }
  setTimeout(doAutoCombatTick, 1200);
}

function toggleAutoCombat() {
  if (!G.cbt.on) return;
  G.cbt.autoCombat = !G.cbt.autoCombat;
  if (G.cbt.autoCombat) {
    lg('🤖 Auto-combat ENABLED!');
    doAutoCombatTick();
  } else {
    lg('🤖 Auto-combat DISABLED. Manual control restored.');
  }
  render();
}

function getIdleZone() {
  // Determine the highest zone the player has unlocked based on level
  const unlockedZones = G.zones.filter(z => G.p.lvl >= z.lv);
  if (unlockedZones.length === 0) return G.zones[0];
  return unlockedZones[unlockedZones.length - 1];
}

function calculateIdleGains(offlineMinutes) {
  const hours = Math.min(offlineMinutes / 60, IDLE_CONFIG.maxOfflineHours);
  const zone = getIdleZone();
  const bonus = IDLE_CONFIG.zoneBonus[zone.n] || { xpMult: 1.0, goldMult: 1.0, mats: [] };

  // Scale with level
  const levelMult = 1 + (G.p.lvl * 0.1);

  const gains = {
    xp: Math.floor(IDLE_CONFIG.xpPerHour * hours * bonus.xpMult * levelMult),
    gold: Math.floor(IDLE_CONFIG.goldPerHour * hours * bonus.goldMult * levelMult),
    materials: [],
    hours: Math.floor(hours * 10) / 10, // Round to 1 decimal
    zone: zone.n
  };

  // Roll for materials
  const matRolls = Math.floor(hours);
  for (let i = 0; i < matRolls; i++) {
    if (Math.random() < IDLE_CONFIG.matChancePerHour) {
      const pool = bonus.mats.length > 0 ? bonus.mats : IDLE_CONFIG.matPool.map(m => m.n);
      const matName = pool[Math.floor(Math.random() * pool.length)];
      const matDef = IDLE_CONFIG.matPool.find(m => m.n === matName) || IDLE_CONFIG.matPool[0];
      gains.materials.push({ ...matDef });
    }
  }

  return gains;
}

function checkIdleGains() {
  const lastActive = localStorage.getItem('ldb_last_active');
  if (!lastActive) return false;

  const now = Date.now();
  const last = parseInt(lastActive);
  const diffMinutes = Math.floor((now - last) / (1000 * 60));

  // Only show if away for at least 5 minutes
  if (diffMinutes < 5) return false;

  const gains = calculateIdleGains(diffMinutes);

  // Only show modal if there are meaningful gains
  if (gains.xp > 0 || gains.gold > 0 || gains.materials.length > 0) {
    showIdleModal(gains);
    return true;
  }

  return false;
}

function unlockRestSites() {
