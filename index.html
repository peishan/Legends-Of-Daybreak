<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https: fonts.googleapis.com; font-src https: fonts.gstatic.com;">
<title>Legends of Daybreak - RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #0f0e17; --bg-card: #1a1825; --bg-hover: #242236; --border: #2e2c42;
  --text: #e8e6f0; --text-dim: #9ca3af; --accent: #7c3aed; --accent-light: #a78bfa;
  --hp: #ef4444; --mp: #3b82f6; --xp: #eab308; --gold: #f59e0b; --success: #22c55e; --danger: #ef4444;
  --rest: #10b981; --rest-dim: #065f46; --dialogue: #f0abfc;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.hdr { background: linear-gradient(135deg, #1a1825, #242236); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.hdr-l { display: flex; align-items: center; gap: 10px; }
.pname { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
.cls { font-size: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.lvl { background: var(--xp); color: #000; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
.hdr-r { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
.sb { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.si { width: 24px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-dim); }
.bar { flex: 1; height: 8px; background: #2e2c42; border-radius: 4px; overflow: hidden; }
.bf { height: 100%; border-radius: 4px; transition: width 0.3s; }
.bf-hp { background: var(--hp); } .bf-mp { background: var(--mp); } .bf-xp { background: var(--xp); }
.bt { min-width: 55px; text-align: right; font-size: 10px; color: var(--text-dim); }
.gold { font-size: 13px; font-weight: 700; color: var(--gold); text-align: right; }
.buffs { display: flex; gap: 6px; padding: 6px 16px; background: #1a1825; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.bp { background: var(--accent); color: white; font-size: 10px; padding: 3px 10px; border-radius: 10px; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.card:hover, .card:active { border-color: var(--accent); background: var(--bg-hover); transform: translateY(-2px); }
.cicon { font-size: 28px; margin-bottom: 6px; }
.clabel { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.cdesc { font-size: 11px; color: var(--text-dim); line-height: 1.3; }
.st { font-family: 'Cinzel', serif; font-weight: 700; margin-bottom: 12px; font-size: 18px; }
.zlist { display: flex; flex-direction: column; gap: 10px; }
.zcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.zcard:hover:not(.locked) { border-color: var(--accent); }
.zcard.locked { opacity: 0.5; cursor: not-allowed; }
.zh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.zn { font-weight: 600; font-size: 15px; }
.zl { font-size: 12px; color: var(--text-dim); }
.zd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.zm { display: flex; gap: 8px; }
.db, .xb { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
.xb { background: #eab30820; color: var(--xp); }
.erow { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.ecard { background: var(--bg-card); border: 2px solid var(--border); border-radius: 14px; padding: 12px; min-width: 90px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.ecard.sel { border-color: var(--danger); box-shadow: 0 0 0 3px #ef444430; }
.ecard.dead { opacity: 0.4; border-color: #333; cursor: default; }
.eicon { font-size: 32px; margin-bottom: 4px; }
.ename { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.hps { height: 6px; background: #2e2c42; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.hpt { font-size: 10px; color: var(--text-dim); }
.dt { font-size: 10px; color: #666; font-style: italic; }
.pstat { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.mst { font-size: 11px; display: flex; align-items: center; gap: 4px; background: #242236; padding: 4px 10px; border-radius: 10px; }
.md { width: 8px; height: 8px; border-radius: 50%; }
.skills h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.slist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.sbtn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.sbtn:hover:not(.dis) { border-color: var(--accent); }
.sbtn.sel { border-color: var(--accent); background: #7c3aed15; }
.sbtn.dis { opacity: 0.4; cursor: not-allowed; }
.sn { font-weight: 600; font-size: 13px; }
.sc { font-size: 11px; color: var(--mp); }
.sd { font-size: 11px; color: var(--text-dim); }
.abtn, .fbtn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; user-select: none; }
.abtn { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; }
.abtn.dis { opacity: 0.4; cursor: not-allowed; }
.fbtn { background: #374151; color: var(--text); }
.plist { display: flex; flex-direction: column; gap: 10px; }
.pcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 14px; align-items: flex-start; }
.pcard.locked { opacity: 0.5; }
.pava { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 20px; }
.pinfo { flex: 1; }
.pn { font-weight: 700; font-size: 15px; }
.pt { font-size: 12px; color: var(--text-dim); font-weight: 400; }
.pr { font-size: 12px; font-weight: 600; margin: 2px 0; }
.pd { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 4px; }
.pb { font-size: 11px; color: var(--success); font-weight: 500; }
.ps { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
.sklist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.skcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.skcard.locked { opacity: 0.5; }
.skh { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ski { font-size: 20px; }
.skt { font-weight: 700; font-size: 14px; flex: 1; }
.sks { font-size: 10px; padding: 3px 10px; border-radius: 10px; background: var(--success); color: white; }
.skcard.locked .sks { background: #6b7280; }
.skd { display: flex; gap: 8px; margin-bottom: 6px; }
.dp { font-size: 11px; background: #242236; padding: 3px 10px; border-radius: 8px; color: var(--text-dim); }
.skdsc { font-size: 12px; color: var(--text-dim); }
.stb { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.stb h3 { font-size: 14px; margin-bottom: 10px; }
.str { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.str:last-child { border-bottom: none; }
.stn { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.stv { font-weight: 700; color: var(--accent-light); }
.eqs, .its { margin-bottom: 16px; }
.eqs h3, .its h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.eqg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.esl { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.esn { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 4px; }
.eit { font-size: 12px; font-weight: 600; }
.est { font-size: 11px; color: var(--success); }
.ese { font-size: 11px; color: #555; font-style: italic; }
.ig { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.ic { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.ii { font-size: 24px; margin-bottom: 4px; }
.in { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.iq { font-size: 11px; color: var(--text-dim); }
.ia { margin-top: 6px; }
.ib { padding: 4px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin: 2px; user-select: none; }
.ib-u { background: var(--success); color: white; }
.ib-e { background: var(--mp); color: white; }
.ei { color: #555; font-style: italic; padding: 20px; text-align: center; grid-column: span 2; }
.rlist { display: flex; flex-direction: column; gap: 10px; }
.rc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.rr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.ri { font-size: 24px; }
.rn { font-weight: 700; font-size: 14px; }
.rd { font-size: 11px; color: var(--text-dim); }
.rms { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.mp { font-size: 10px; padding: 3px 10px; border-radius: 8px; background: #242236; color: var(--text-dim); }
.mp.ok { background: #22c55e20; color: var(--success); }
.mp.miss { background: #ef444420; color: var(--danger); }
.cb { width: 100%; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--accent); color: white; user-select: none; }
.cb.dis { opacity: 0.4; cursor: not-allowed; }
.qlist { display: flex; flex-direction: column; gap: 10px; }
.qc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.qc.done { border-color: var(--success); }
.qh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.qn { font-weight: 600; font-size: 14px; }
.qr { font-size: 11px; color: var(--gold); }
.qd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.qp { display: flex; align-items: center; gap: 10px; }
.pbar { flex: 1; height: 8px; background: #2e2c42; border-radius: 4px; overflow: hidden; }
.pfill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
.ptxt { font-size: 11px; color: var(--text-dim); min-width: 40px; text-align: right; }
.sum { display: flex; gap: 10px; margin-top: 16px; }
.si2 { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.sv { font-size: 20px; font-weight: 700; color: var(--accent-light); display: block; }
.sl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.fv { text-align: center; padding: 20px; }
.fc { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; }
.ft { font-size: 36px; font-weight: 700; color: var(--accent-light); font-family: 'Cinzel', serif; }
.fl { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.ftips { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; text-align: left; }
.ftips h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.ftips ul { list-style: none; padding: 0; }
.ftips li { font-size: 13px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px solid var(--border); }
.ftips li:last-child { border-bottom: none; }
.ftips li::before { content: "→ "; color: var(--accent); font-weight: 700; }
.cfb { padding: 12px 24px; border-radius: 12px; border: 1px solid var(--danger); background: transparent; color: var(--danger); font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; }
.log { background: #0a0912; border-top: 1px solid var(--border); padding: 10px 16px; max-height: 120px; overflow-y: auto; font-size: 12px; line-height: 1.5; flex-shrink: 0; }
.le { padding: 2px 0; color: var(--text-dim); border-bottom: 1px solid #1a1825; }
.le:last-child { border-bottom: none; }
.nav { display: flex; justify-content: space-around; background: #1a1825; border-top: 1px solid var(--border); padding: 6px 0; position: sticky; bottom: 0; z-index: 10; flex-shrink: 0; }
.nb { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 500; padding: 6px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; user-select: none; flex: 1; }
.nb::before { font-size: 18px; display: block; }
.nb[data-t="home"]::before { content: "🏠"; }
.nb[data-t="exp"]::before { content: "🗺️"; }
.nb[data-t="party"]::before { content: "👥"; }
.nb[data-t="quest"]::before { content: "📜"; }
.nb[data-t="craft"]::before { content: "⚒️"; }
.nb[data-t="inv"]::before { content: "🎒"; }
.nb:hover, .nb.on { color: var(--accent-light); }

/* REST SYSTEM STYLES */
.rest-view { text-align: center; }
.rest-sites { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.rs-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s; user-select: none; text-align: left; }
.rs-card:hover:not(.locked) { border-color: var(--rest); background: #10b98110; }
.rs-card.locked { opacity: 0.4; cursor: not-allowed; }
.rs-card.active { border-color: var(--rest); background: #10b98115; }
.rs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.rs-name { font-weight: 600; font-size: 15px; }
.rs-type { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: #242236; color: var(--text-dim); }
.rs-type.camp { background: #10b98120; color: var(--rest); }
.rs-type.tavern { background: #f59e0b20; color: var(--gold); }
.rs-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.rs-req { font-size: 11px; color: var(--text-dim); }
.rs-req.ok { color: var(--success); }
.rs-req.fail { color: var(--danger); }
.rest-progress { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.rest-timer { font-size: 48px; font-weight: 700; color: var(--rest); font-family: 'Cinzel', serif; margin-bottom: 8px; }
.rest-label { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
.rest-bar { height: 12px; background: #2e2c42; border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
.rest-fill { height: 100%; background: linear-gradient(90deg, var(--rest), #34d399); border-radius: 6px; transition: width 0.3s ease; }
.rest-healer { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.rest-healer.ok { color: var(--success); }
.rest-healer.fail { color: var(--danger); }
.rest-cancel { padding: 10px 24px; border-radius: 10px; border: 1px solid var(--danger); background: transparent; color: var(--danger); font-size: 13px; font-weight: 600; cursor: pointer; }
.rest-result { background: var(--bg-card); border: 1px solid var(--rest); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.rest-result h3 { color: var(--rest); font-size: 16px; margin-bottom: 8px; }
.rest-result p { font-size: 13px; color: var(--text-dim); }

/* CAMPFIRE REST - TICK STYLES */
.tick-track { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.tick { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s; }
.tick.done { background: var(--rest); border-color: var(--rest); color: white; }
.tick.current { border-color: var(--rest); box-shadow: 0 0 0 3px #10b98140; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 3px #10b98140; } 50% { box-shadow: 0 0 0 6px #10b98120; } }
.tick-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* DIALOGUE STYLES */
.dialogue-box { background: #1a1825; border: 1px solid var(--dialogue); border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; animation: fadeIn 0.5s ease; }
.dialogue-box .d-speaker { font-size: 12px; font-weight: 700; color: var(--dialogue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.dialogue-box .d-text { font-size: 13px; color: var(--text); line-height: 1.5; font-style: italic; }
.dialogue-box .d-tick { font-size: 10px; color: var(--text-dim); margin-top: 6px; text-align: right; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* AMBUSH WARNING */
.ambush-warning { background: #ef444415; border: 1px solid var(--danger); border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: left; animation: shake 0.5s ease; }
.ambush-warning .aw-text { font-size: 13px; color: var(--danger); font-weight: 600; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

/* ELEMENTAL IMMUNITY INDICATOR */
.e-immune { font-size: 10px; color: #f59e0b; font-weight: 600; margin-top: 2px; }
.rs-type.temple { background: #7c3aed20; color: var(--accent-light); }
.temple-revive { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
.temple-revive.dead { border-color: var(--danger); background: #ef444410; }
.temple-revive.alive { opacity: 0.5; }
.tr-ava { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 18px; }
.tr-info { flex: 1; text-align: left; }
.tr-name { font-weight: 600; font-size: 14px; }
.tr-status { font-size: 11px; color: var(--danger); }
.tr-status.alive { color: var(--success); }
.tr-btn { padding: 8px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; }
.tr-btn.dis { opacity: 0.4; cursor: not-allowed; background: #555; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>

const G = {
  state: 'menu',
  p: {
    name: 'San', cls: 'Sorcerer', lvl: 1, xp: 0, xpN: 100,
    hp: 80, mhp: 80, mp: 120, mmp: 120, gold: 50,
    stats: { str: 4, dex: 6, con: 5, int: 12, wis: 10, cha: 8 },
    skills: [
      { n: 'Arcane Bolt', c: 10, dmg: '1d8', on: true, d: 'Basic magic missile', elem: 'arcane' },

      { n: 'Frost Shield', c: 15, on: false, ul: 2, d: '+5 AC for 3 turns', buff: true, elem: 'ice' },
      { n: 'Lightning Strike', c: 35, dmg: '3d8', on: false, ul: 5, d: 'Devastating single target', elem: 'lightning' },

      { n: 'Meteor Swarm', c: 60, dmg: '4d10', on: false, ul: 8, d: 'Ultimate destruction', elem: 'fire' }
    ],
    eq: { w: { n: 'Apprentice Staff', atk: 2, r: 'common' }, a: { n: 'Novice Robes', def: 2, r: 'common' }, acc: null },
    inv: [
      { n: 'Health Potion', t: 'pot', eff: 'heal', v: 30, q: 3, r: 'common' },
      { n: 'Mana Potion', t: 'pot', eff: 'mana', v: 25, q: 2, r: 'common' },
      { n: 'Phoenix Feather', t: 'revive', eff: 'revive', v: 50, q: 1, r: 'rare' },
      { n: 'Goblin Tooth', t: 'mat', q: 2, r: 'common' },
      { n: 'Iron Ore', t: 'mat', q: 3, r: 'common' },
      { n: 'Herb Bundle', t: 'mat', q: 4, r: 'common' }
    ],
    buffs: [], kills: 0, quests: 0, fstreak: 0

function updateAffinity(partyMemberName, amount) {
  if (!G.affinity[partyMemberName]) return;
  G.affinity[partyMemberName].val = Math.max(0, Math.min(G.affinity[partyMemberName].max, G.affinity[partyMemberName].val + amount));
  G.affinity[partyMemberName].lastInteract = Date.now();
  if (amount > 0) {
    lg('💕 Affinity with ' + partyMemberName + ' +' + amount + ' (' + G.affinity[partyMemberName].val + '/' + G.affinity[partyMemberName].max + ')');
  }
  checkAffinityDecay();
}

function checkAffinityDecay() {
  const now = Date.now();
  for (let name in G.affinity) {
    const aff = G.affinity[name];
    const hoursSince = (now - aff.lastInteract) / (1000 * 60 * 60);
    if (hoursSince > 24) {
      const decay = Math.floor(hoursSince / 24) * aff.decayRate * 10;
      aff.val = Math.max(0, aff.val - decay);
      if (decay > 0) {
        lg('💔 ' + name + ' feels neglected. Affinity -' + Math.floor(decay) + ' (' + aff.val + ')');
      }
      aff.lastInteract = now;
    }
  }
}

function getAffinityColor(val) {
  if (val >= 70) return 'affinity-high';
  if (val >= 40) return 'affinity-mid';
  return 'affinity-low';
}

function updateTimedQuests() {
  for (let q of G.quests) {
    if (q.timed && !q.done && !q.expired && q.timer > 0) {
      q.timer--;
      if (q.timer <= 0) {
        q.expired = true;
        lg('⏰ Quest expired: ' + q.n + '!');
      }
    }
  }
}

function getTimerStatus(q) {
  if (!q.timed || q.done || q.expired) return null;
  const pct = (q.timer / q.timerMax) * 100;
  if (q.timer <= 0) return { cls: 'timer-expired', label: 'EXPIRED', pct: 0 };
  if (pct < 25) return { cls: 'timer-urgent', label: q.timer + ' ticks left', pct: pct };
  return { cls: 'timer-ok', label: q.timer + ' ticks left', pct: pct };
}

function checkNPCUnlocks() {

        npc.unlocked = true;
        lg('🌟 ' + npc.n + ' ' + npc.title + ' has joined as an ally!');

function buyFromNPC(npcName, itemIdx) {
  const npc = G.npcs.find(n => n.n === npcName);
  if (!npc || !npc.unlocked || npc.t !== 'trader') return;
  const item = npc.stock[itemIdx];
  if (!item) return;
  if (G.p.gold < item.price) {
    lg('❌ Not enough gold! ' + item.n + ' costs ' + item.price + 'G.');
    return;
  }
  G.p.gold -= item.price;
  const boughtItem = { n: item.n, t: item.t, q: item.q || 1, r: item.r };
  if (item.atk) boughtItem.atk = item.atk;
  if (item.def) boughtItem.def = item.def;
  if (item.int) boughtItem.int = item.int;
  if (item.cha) boughtItem.cha = item.cha;
  addI(boughtItem);
  npc.visitCount++;
  lg('🧳 Bought ' + item.n + ' from ' + npc.n + ' for ' + item.price + 'G!');
  if (npc.visitCount === 1) {
    lg('   ' + npc.n + ': "Pleasure doing business, mage."');
  }
  render();
}

function getDayNumber() {
  return Math.floor(Date.now() / (1000 * 60 * 60 * 24));
}

function refreshBounties() {
  const today = getDayNumber();
  let refreshed = false;
  for (let b of G.bounties) {
    if (b.done && b.refreshDay !== today) {
      b.done = false;
      b.c = 0;
      b.refreshDay = today;
      refreshed = true;
    }
  }
  if (refreshed) {
    lg('📋 New bounties available!');
  }
}

function checkStoryline() {
  for (let s of G.storyline) {
    if (s.done) continue;
    if (!s.unlocked) {
      // Check if previous chapter is done
      const prev = G.storyline.find(ch => ch.chapter === s.chapter - 1);
      if (!prev || prev.done) {
        s.unlocked = true;
        lg('📖 Storyline unlocked: Chapter ' + s.chapter + ' - ' + s.n + '!');
      }
    }
    if (s.unlocked && G.p.lvl >= s.need) {
      s.c = s.need;
      s.done = true;
      G.p.xp += s.rw.xp;
      G.p.gold += s.rw.g;
      G.p.quests++;
      lg('📖 Storyline complete: ' + s.n + '! +' + s.rw.xp + 'XP +' + s.rw.g + 'G');
      lvlup();
    }
  }
}

function checkBountyKill(enemyName) {
  for (let b of G.bounties) {
    if (b.done) continue;
    if (b.t === 'kill_specific' && enemyName === b.target) {
      b.c++;
      if (b.c >= b.need) {

}

function rd(s) { return Math.floor(Math.random()*s)+1; }
function rdc(n,s) { let sum=0; for(let i=0;i<n;i++)sum+=rd(s); return sum; }
function r20() { return rd(20); }
function pd(ds,b) {
  if(!ds) return 0;
  const m=ds.match(/(\d+)d(\d+)/);
  if(!m) return b||0;
  return rdc(parseInt(m[1]),parseInt(m[2]))+(b||0);
}

function isImmune(enemyName, spellElem) {
  if (!spellElem) return false;
  const fireMobs = ['Fire Imp', 'Lava Slug', 'Ash Wraith'];
  const iceMobs = ['Ice Elemental', 'Frost Wolf', 'Frozen Knight'];
  if (spellElem === 'fire' && fireMobs.includes(enemyName)) return true;
  if (spellElem === 'ice' && iceMobs.includes(enemyName)) return true;
  return false;
}

function pickBanter(type, tense) {
  const pool = [];
  if (tense) {
    pool.push(...G.banter.tense);
  } else if (type === 'tavern' && Math.random() < 0.4) {
    pool.push(...G.banter.tavern);
  }
  const active = G.party.filter(p => p.on);
  if (active.length === 0 && !tense) {
    pool.push(...G.banter.solo);
  } else if (!tense) {
    for (let p of active) {
      const key = p.n.toLowerCase();
      if (G.banter[key]) pool.push(...G.banter[key]);
    }
  }
  if (pool.length === 0) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function showDialogue(dialogue) {
  if (!dialogue) return;
  G.currentDialogue = dialogue;
  lg('💬 ' + dialogue.speaker + ': ' + dialogue.text);
}

function showAmbushWarning(dialogue) {
  if (!dialogue) return;
  G.ambushWarning = dialogue;
  lg('⚠️ ' + dialogue.text);
}

function doRestTick() {
  const healAmt = Math.ceil(G.p.mhp / G.rest.maxTicks);
  const manaAmt = Math.ceil(G.p.mmp / G.rest.maxTicks);
  G.p.hp = Math.min(G.p.mhp, G.p.hp + healAmt);
  G.p.mp = Math.min(G.p.mmp, G.p.mp + manaAmt);
  for (let p of G.party) {
    if (p.on) {
      p.hp = Math.min(p.mhp, p.hp + Math.ceil(p.mhp / G.rest.maxTicks));
    }
  }
  const line = pickBanter(G.rest.selectedSite.type, false);
  if (line) showDialogue(line);
  render();
}

function startRest(siteId) {
  if (G.rest.active) return;
  const site = G.rest.sites.find(s => s.id === siteId);
  if (!site || !site.unlocked) {
    lg('That rest site is not available yet.');
    return;
  }
  if (!hasHealer()) {
    lg('❌ No healer in active party! You need a healer to rest safely.');
    return;
  }
  if (site.cost && G.p.gold < site.cost) {
    lg('❌ Not enough gold! ' + site.name + ' costs ' + site.cost + 'G.');
    return;
  }
  if (site.cost) {
    G.p.gold -= site.cost;
    lg('💰 Paid ' + site.cost + 'G for ' + site.name + '.');
  }
  G.rest.active = true;
  G.rest.selectedSite = site;
  G.rest.tick = 0;
  G.rest.ambushPending = false;
  G.currentDialogue = null;
  G.ambushWarning = null;
  const healerName = getHealerName();
  lg('💤 ' + healerName + ' begins the rest ritual at ' + site.name + '...');
  lg('🔥 Campfire lit. 5 ticks to full recovery.');
  doRestTick();
  G.rest.tick = 1;
  render();
  restTimer = setInterval(() => {
    if (!G.rest.active) {
      clearInterval(restTimer);
      restTimer = null;
      return;
    }
    const ambushChance = G.rest.selectedSite.type === 'tavern' ? 0.05 : 0.15;
    if (Math.random() < ambushChance && G.rest.tick < G.rest.maxTicks) {
      const tenseLine = pickBanter(G.rest.selectedSite.type, true);
      showAmbushWarning(tenseLine);
      clearInterval(restTimer);
      restTimer = null;
      G.rest.active = false;
      G.rest.ambushPending = true;
      setTimeout(() => {
        G.rest.ambushPending = false;
        G.currentDialogue = null;
        G.ambushWarning = null;
        const zi = G.zones.findIndex(z => z.n === G.rest.selectedSite.zone);
        sc(zi >= 0 ? zi : 0);
        G.rest.selectedSite = null;
        G.rest.tick = 0;
      }, 1500);
      return;
    }
    doRestTick();
    G.rest.tick++;
    if (G.rest.tick >= G.rest.maxTicks) {
      clearInterval(restTimer);
      restTimer = null;
      completeRest();
    }
  }, G.rest.tickDuration);
}

function completeRest() {
  if (restTimer) {
    clearInterval(restTimer);
    restTimer = null;
  }
  const healerName = getHealerName();
  G.p.hp = G.p.mhp;
  G.p.mp = G.p.mmp;
  for (let p of G.party) {
    if (p.on) p.hp = p.mhp;
  }
  G.p.buffs = G.p.buffs.filter(b => b.t > 0);
  G.currentDialogue = null;
  G.ambushWarning = null;
  const siteName = G.rest.selectedSite ? G.rest.selectedSite.name : 'camp';
  lg('✨ Rest complete at ' + siteName + '!');
  lg('💚 ' + healerName + ' has restored everyone to full health.');
  // Affinity gain for resting together
  for (let p of G.party) { if (p.on) updateAffinity(p.n, 2); }
  // Track rest_with quest progress
  for(let q of G.quests){
    if(!q.done && !q.expired && q.t==='rest_with' && G.party.find(p=>p.on && p.n===q.reqParty)){
      q.c++;
      if(q.c>=q.need){
        q.done=true;
        G.p.xp+=q.rw.xp;
        G.p.gold+=q.rw.g;
        G.p.quests++;
        lg('Quest: '+q.n+'! +'+q.rw.xp+'XP +'+q.rw.g+'G');
        lvlup();
      }
    }
  }
  G.rest.active = false;
  G.rest.selectedSite = null;
  G.rest.tick = 0;
  G.rest.ambushPending = false;
  render();
}

function cancelRest() {
  if (!G.rest.active) return;
  if (restTimer) {
    clearInterval(restTimer);
    restTimer = null;
  }
  const pct = G.rest.tick / G.rest.maxTicks;
  const hpRestore = Math.floor(G.p.mhp * pct * 0.5);
  const mpRestore = Math.floor(G.p.mmp * pct * 0.5);
  G.p.hp = Math.min(G.p.mhp, G.p.hp + hpRestore);
  G.p.mp = Math.min(G.p.mmp, G.p.mp + mpRestore);
  for (let p of G.party) {
    if (p.on) {
      p.hp = Math.min(p.mhp, p.hp + Math.floor(p.mhp * pct * 0.5));
    }
  }
  G.currentDialogue = null;
  G.ambushWarning = null;
  lg('⛔ Rest interrupted! Only partial recovery (' + Math.floor(pct * 100) + '%).');
  G.rest.active = false;
  G.rest.selectedSite = null;
  G.rest.tick = 0;
  G.rest.ambushPending = false;
  render();
}

function sc(zi) {
  const z=G.zones[zi];
  G.cbt.on=true; G.cbt.turn=0; G.cbt.en=[]; G.state='combat';
  // Boss fight: only when player is 2+ levels above zone minimum
  const bossChance = Math.random();
  let isBoss = false;
  if (bossChance < 0.08 && G.p.lvl >= z.lv + 2) {
    const boss = G.bosses.find(b => b.zone === z.n);
    if (boss) {
      isBoss = true;
      G.currentBoss = JSON.parse(JSON.stringify(boss));
      G.currentBoss.id = 99;

function pa(si,ti){
  const sk=G.p.skills[si], tg=G.cbt.en[ti];
  if(!tg||tg.hp<=0) return;
  if(G.p.mp<sk.c){lg('Not enough MP!');return;}
  G.p.mp-=sk.c;

  if(sk.buff){
    if(sk.n=='Frost Shield'){G.p.buffs.push({n:'Frost Shield',t:3,def:5});lg('Frost Shield! DEF +5 for 3 turns.');}
    else if(sk.n=='Mana Surge'){G.p.mp=Math.min(G.p.mmp,G.p.mp+20);lg('Mana Surge! Restored 20 MP.');}
  } else {
    if (isImmune(tg.n, sk.elem)) {
      lg(sk.n + ' has no effect — ' + tg.n + ' is immune to ' + sk.elem + '!');
    } else {
      const hit=r20()+Math.floor(G.p.stats.int/3);
      if(hit>=10+tg.def){
        let dmg=pd(sk.dmg,Math.floor(G.p.stats.int/2));
        dmg+=G.p.eq.w?G.p.eq.w.atk:0;
        if(G.party[2].on)dmg=Math.floor(dmg*1.15);
        dmg=Math.max(1,dmg-Math.floor(tg.def/2));
        tg.hp-=dmg; lg(sk.n+' hits '+tg.n+' for '+dmg+'!');
        if(tg.hp<=0){lg(tg.n+' defeated!');tg.hp=0;}
      }else lg('Missed '+tg.n+'!');
    }
  }

  for(let p of G.party){
    if(!p.on||p.hp<=0)continue;
    const ae=G.cbt.en.filter(e=>e.hp>0);
    if(ae.length==0)break;
    const et=ae[Math.floor(Math.random()*ae.length)];
    const h=r20()+Math.floor(p.atk/3);
    if(h>=10+et.def){
      let d=rdc(1,6)+Math.floor(p.atk/2);
      d=Math.max(1,d-Math.floor(et.def/3));
      et.hp-=d; lg(p.n+' hits '+et.n+' for '+d+'!');
      if(et.hp<=0){lg(et.n+' falls!');et.hp=0;}
    }else lg(p.n+' misses!');
  }
  eturn();
  // Boss mechanics: resurrect and phases
  for (let e of G.cbt.en) {
    if (e.hp <= 0 && e.mechanic === 'resurrect' && e.resurrectCount > 0) {
      e.resurrectCount--;
      e.hp = Math.floor(e.mhp * 0.5);
      lg('💀 ' + e.n + ' RESURRECTS! HP restored to ' + e.hp + '! (' + e.resurrectCount + ' lives left)');
    }
    if (e.hp > 0 && e.mechanic === 'phase') {
      const phaseThreshold = e.mhp - (e.currentPhase * e.phaseHp);
      if (e.hp <= phaseThreshold && e.currentPhase < e.phases) {
        e.currentPhase++;
        lg('💎 ' + e.n + ' shifts to PHASE ' + e.currentPhase + '! Defenses change!');
        e.def += 3;
        e.atk += 2;
      }
    }
  }

  if(G.cbt.en.every(e=>e.hp<=0)){
    const txp=G.cbt.en.reduce((s,e)=>s+e.xp,0);
    let tg2=G.cbt.en.reduce((s,e)=>s+e.g,0);
    if(G.party[1].on)tg2=Math.floor(tg2*1.2);
    G.p.xp+=txp; G.p.gold+=tg2; G.p.kills+=G.cbt.en.length;
    lg('Victory! +'+txp+' XP, +'+tg2+' Gold!');
    // Affinity gain for active party
    for(let p of G.party){
      if(p.on && p.hp > 0) updateAffinity(p.n, 1);
    }
    const z=G.zones.find(z=>z.en.includes(G.cbt.en[0].n));
    if(z){
      const l=z.loot[Math.floor(Math.random()*z.loot.length)];
      addI({n:l,t:'mat',q:1,r:'common'});
      lg('Found: '+l);
      const campSite = G.rest.sites.find(s => s.zone === z.n && s.type === 'camp');
      const tavernSite = G.rest.sites.find(s => s.zone === z.n && s.type === 'tavern');
      if (campSite && !campSite.unlocked) {
        campSite.unlocked = true;
        lg('🏕️ Campsite discovered in ' + z.n + '!');
      }
      if (tavernSite && !tavernSite.unlocked && G.p.lvl >= tavernSite.zoneLv) {
        tavernSite.unlocked = true;
        lg('🍺 Tavern discovered: ' + tavernSite.name + '!');
      }
    }
    lvlup(); checkQ();
    G.currentBoss=null;
    G.cbt.on=false; G.state='explore';
  }else if(G.p.hp<=0){
    G.p.hp=1; 
    for(let p of G.party){
      if(p.hp <= 0){
        p.hp = 1;
        p.on = true;
        lg('🆘 ' + p.n + ' barely clings to life with 1 HP!');
      }
    }
    lg('Defeated! Retreating...');
    G.cbt.on=false; G.state='menu';
  }
  G.cbt.turn++; render();
}

function eturn(){
  for(let e of G.cbt.en){
    if(e.hp<=0)continue;

    // Boss mechanics
    if (e.mechanic) {
      G.cbt.turn = G.cbt.turn || 0;
      if (e.mechanic === 'rampage' && G.cbt.turn >= e.rampageTurn) {
        lg('🔥 ' + e.n + ' ENRAGES! All party members take ' + e.rampageDmg + ' damage!');
        G.p.hp = Math.max(1, G.p.hp - e.rampageDmg);
        for (let p of G.party) { if (p.on) p.hp = Math.max(1, p.hp - e.rampageDmg); }
      }
      if (e.mechanic === 'inferno' && G.cbt.turn >= e.infernoTurn) {
        lg('🔥 ' + e.n + ' unleashes INFERNO! Party takes ' + e.infernoDmg + ' damage!');
        G.p.hp = Math.max(1, G.p.hp - e.infernoDmg);
        for (let p of G.party) { if (p.on) p.hp = Math.max(1, p.hp - e.infernoDmg); }
      }
      if (e.mechanic === 'freeze' && Math.random() < e.freezeChance) {
        const targets = [G.p, ...G.party.filter(p=>p.on&&p.hp>0)];
        const target = targets[Math.floor(Math.random()*targets.length)];
        lg('❄️ ' + e.n + ' freezes ' + (target.n||'you') + '! Skip next turn!');
        target.frozen = true;
      }
      if (e.mechanic === 'devour' && G.cbt.turn >= e.devourTurn) {
        const targets = G.party.filter(p=>p.on&&p.hp>0);
        if (targets.length > 0) {
          const victim = targets[Math.floor(Math.random()*targets.length)];
          lg('🌑 ' + e.n + ' DEVOURS ' + victim.n + '!');
          victim.hp = 0;
          lg(victim.n + ' has been devoured!');
        }
      }
      if (e.mechanic === 'apocalypse' && G.cbt.turn >= e.apocalypseTurn) {
        lg('💥 ' + e.n + ' uses APOCALYPSE! Total party wipe!');
        G.p.hp = 1;
        for (let p of G.party) { if (p.on) p.hp = 0; }
      }
    }

    let t=G.p;
    if(Math.random()>0.5){
      const ap=G.party.filter(p=>p.on&&p.hp>0);
      if(ap.length>0)t=ap[Math.floor(Math.random()*ap.length)];
    }
    const hit=r20()+Math.floor(e.atk/3);
    let td=t==G.p?(G.p.eq.a?G.p.eq.a.def:0):t.def;
    if(t==G.p)td+=G.p.buffs.reduce((s,b)=>s+(b.def||0),0);
    if(hit>=10+td){
      let d=rdc(1,6)+Math.floor(e.atk/2);
      d=Math.max(1,d-Math.floor(td/2));
      t.hp-=d; lg(e.n+' hits '+(t.n||'you')+' for '+d+'!');
      if(t.hp<=0){
        if(t!==G.p && t.passive==='guardian_spirit'){
          t.hp=1; lg('✨ '+t.n+"'s Guardian Spirit shines! She endures at 1 HP!");
        }else{
          t.hp=0; lg((t.n||'You')+' unconscious!');
        }
      }
    }else lg(e.n+' misses!');
  }
  for(let b of G.p.buffs)b.t--;
  G.p.buffs=G.p.buffs.filter(b=>b.t>0);
  // Clear frozen status after boss turn
  for (let p of G.party) { if (p.frozen) { p.frozen = false; } }
  if (G.p.frozen) { G.p.frozen = false; }
}

function lvlup(){
  while(G.p.xp>=G.p.xpN){
    G.p.xp-=G.p.xpN; G.p.lvl++;
    G.p.xpN=Math.floor(G.p.xpN*1.5);
    G.p.mhp+=10; G.p.mmp+=15; G.p.hp=G.p.mhp; G.p.mp=G.p.mmp;
    G.p.stats.int+=2; G.p.stats.con+=1;
    lg('LEVEL UP! Now Level '+G.p.lvl+'!');
    for(let s of G.p.skills){if(!s.on&&s.ul<=G.p.lvl){s.on=true;lg('Learned: '+s.n+'!');}}
    for(let p of G.party){if(!p.on&&p.ul<=G.p.lvl){p.on=true;p.hp=p.mhp;lg(p.n+' '+p.t+' joins!');}}
    unlockRestSites();
    checkNPCUnlocks();
    checkStoryline();
  }
}

function checkQ(){
  for(let q of G.quests){
    if(q.done)continue;
    if(q.hidden && !q.revealed)continue;
    if(q.t=='kill'&&G.p.kills>=q.c+q.need)q.c=q.need;
    if(q.c>=q.need){q.done=true;G.p.xp+=q.rw.xp;G.p.gold+=q.rw.g;G.p.quests++;lg('Quest: '+q.n+'! +'+q.rw.xp+'XP +'+q.rw.g+'G');checkQuestChains();lvlup();}
  }
}

function checkQuestChains(){
  for(let q of G.quests){
    if(q.hidden && !q.revealed && q.reqQuest){
      const req=G.quests.find(rq=>rq.id===q.reqQuest);
      if(req && req.done){
        q.revealed=true;
        q.hidden=false;
        lg('🔓 Hidden quest unlocked: '+q.n+'!');
        lg('   '+q.d);
      }
    }
  }
}

function addI(it){
  const ex=G.p.inv.find(i=>i.n==it.n&&i.t==it.t);
  if(ex)ex.q+=it.q||1;
  else G.p.inv.push({...it,q:it.q||1});
}

function useI(ix){
  const it=G.p.inv[ix];
  if(!it)return;
  if(it.t=='pot'){
    if(it.eff=='heal'){G.p.hp=Math.min(G.p.mhp,G.p.hp+it.v);lg('Used '+it.n+'. +'+it.v+' HP.');}
    else if(it.eff=='mana'){G.p.mp=Math.min(G.p.mmp,G.p.mp+it.v);lg('Used '+it.n+'. +'+it.v+' MP.');}
    it.q--; if(it.q<=0)G.p.inv.splice(ix,1);
    render();
  } else if(it.t=='revive'){
    const dead=getDeadParty();
    if(dead.length===0){lg('❌ No fallen companions to revive!');return;}
    const target=dead[0];
    target.hp=Math.floor(target.mhp*(it.v/100));
    target.on=true;
    lg('🔥 '+it.n+' burns with sacred flame!');
    lg('✨ '+target.n+' revived with '+target.hp+' HP!');
    it.q--; if(it.q<=0)G.p.inv.splice(ix,1);
    render();
  }
}

function craft(ri){
  const r=G.recipes[ri];
  for(let [mn,mq] of Object.entries(r.m)){
    const iv=G.p.inv.find(x=>x.n==mn);
    if(!iv||iv.q<mq){lg('Missing mats for '+r.n);return;}
  }
  for(let [mn,mq] of Object.entries(r.m)){
    const iv=G.p.inv.find(x=>x.n==mn);
    iv.q-=mq; if(iv.q<=0){const ix=G.p.inv.indexOf(iv);G.p.inv.splice(ix,1);}
  }
  addI({...r.res}); lg('Crafted: '+r.n+'!');
  const pq=G.quests.find(q=>q.t=='craft');
  if(pq&&!pq.done){pq.c++;checkQ();}
  render();
}

function eqI(ix){
  const it=G.p.inv[ix];
  if(!it||(it.t!='wep'&&it.t!='arm'&&it.t!='acc'))return;
  const sl=it.t=='wep'?'w':it.t=='arm'?'a':'acc';
  const old=G.p.eq[sl];
  if(old)addI(old);
  G.p.eq[sl]={...it};
  G.p.inv.splice(ix,1);
  lg('Equipped '+it.n+'!'); render();
}

let ft=null;
function sf(){
  G.state='focus'; G.fs=Date.now(); G.fd=25*60*1000;
  triggerSoelCommentary('focus');
  lg('Focus started! 25 min...'); render();
  ft=setInterval(()=>{
    const el=Date.now()-G.fs, rm=G.fd-el;
    if(G.state!='focus'){clearInterval(ft);return;}
    if(rm<=0){
      clearInterval(ft); G.p.fstreak++; G.p.xp+=100; G.p.gold+=50;
      const fq=G.quests.find(q=>q.t=='focus');
      if(fq&&!fq.done){fq.c++;checkQ();}
      lg('Focus complete! +100XP +50G Streak:'+G.p.fstreak);
      lvlup(); G.state='menu'; render();
    }else{
      const el2=document.getElementById('ft');
      if(el2){const m=Math.floor(rm/60000),s=Math.floor((rm%60000)/1000);el2.textContent=m+':'+s.toString().padStart(2,'0');}
    }
  },1000);
}

function cf(){if(ft)clearInterval(ft);setS('menu');lg('Focus cancelled.');render();}

function lg(msg){
  G.log.push(msg); if(G.log.length>50)G.log.shift();
  const el=document.getElementById('log');
  if(el){el.innerHTML=G.log.map(m=>'<div class="le">'+m+'</div>').join('');el.scrollTop=el.scrollHeight;}
}

function setS(s){
  if (s === 'quest') triggerSoelCommentary('quest_view');
  if (s === 'craft') triggerSoelCommentary('craft');
  if (s === 'skills') triggerSoelCommentary('skills');
  if (s === 'rest') triggerSoelCommentary('rest');
  if (s === 'party') triggerSoelCommentary('party');
  G.state=s;render();
}
function flee(){
  if(G.currentBoss){
    if(Math.random()>0.3){
      lg('🏃 Escaped from ' + G.currentBoss.n + '!');
      lg('💀 Penalty: Party loses 25% HP from retreat!');
      G.p.hp = Math.max(1, Math.floor(G.p.hp * 0.75));
      for(let p of G.party){ if(p.on) p.hp = Math.max(1, Math.floor(p.hp * 0.75)); }
      G.currentBoss=null; G.cbt.on=false; G.state='explore';
    }else{
      lg('Flee failed! ' + G.currentBoss.n + ' blocks your path!');
      eturn();
    }
  }else{
    if(Math.random()>0.5){lg('Fled!');G.currentBoss=null;G.cbt.on=false;G.state='explore';}
    else{lg('Flee failed!');eturn();}
  }
  render();
}

      name: G.p.name, cls: G.p.cls, lvl: G.p.lvl, xp: G.p.xp, xpN: G.p.xpN,

      equipment: { w: G.p.eq.w, a: G.p.eq.a, acc: G.p.eq.acc },
      inventory: G.p.inv,
      buffs: G.p.buffs,
      kills: G.p.kills, quests: G.p.quests, fstreak: G.p.fstreak
    },
    party: G.party.map(p => ({ n: p.n, t: p.t, r: p.r, hp: p.hp, mhp: p.mhp, atk: p.atk, def: p.def, spd: p.spd, on: p.on, ul: p.ul, d: p.d, b: p.b, col: p.col })),

      sites: G.rest.sites.map(s => ({ id: s.id, unlocked: s.unlocked }))
    },
    log: G.log,

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    G.p.lvl = data.player.lvl;
    G.p.xp = data.player.xp;
    G.p.xpN = data.player.xpN;
    G.p.hp = data.player.hp;
    G.p.mhp = data.player.mhp;
    G.p.mp = data.player.mp;
    G.p.mmp = data.player.mmp;
    G.p.gold = data.player.gold;
    G.p.stats = data.player.stats;
    G.p.inv = data.player.inventory;
    G.p.buffs = data.player.buffs || [];
    G.p.kills = data.player.kills;
    G.p.quests = data.player.quests;
    G.p.fstreak = data.player.fstreak;

    for (let s of G.p.skills) {
      const saved = data.player.skills.find(ss => ss.n === s.n);
      if (saved) s.on = saved.on;
    }

    G.p.eq = data.player.equipment;

    for (let p of G.party) {
      const saved = data.party.find(sp => sp.n === p.n);
      if (saved) {
        p.on = saved.on;
        p.hp = saved.hp;
        p.mhp = saved.mhp;
      }
    }

    for (let q of G.quests) {
      const saved = data.quests.find(sq => sq.id === q.id);
      if (saved) {
        q.c = saved.c;
        q.done = saved.done;
      }
    }

    if (data.rest && data.rest.sites) {
      for (let s of G.rest.sites) {
        const saved = data.rest.sites.find(ss => ss.id === s.id);
        if (saved) {
          s.unlocked = saved.unlocked;
        }
      }
    }

    if (data.affinity) {
      for (let name in data.affinity) {
        if (G.affinity[name]) {
          G.affinity[name].val = data.affinity[name].val;
          G.affinity[name].lastInteract = data.affinity[name].lastInteract;
        }
      }
    }
    if (data.affinity) {
      for (let name in data.affinity) {
        if (G.affinity[name]) {
          G.affinity[name].val = data.affinity[name].val;
          G.affinity[name].lastInteract = data.affinity[name].lastInteract;
        }
      }
    }
    if (data.soelCommentCooldown !== undefined) {
      G.soelCommentCooldown = data.soelCommentCooldown;
    }
    if (data.npcs) {
      for (let n of G.npcs) {
        const saved = data.npcs.find(sn => sn.n === n.n);
        if (saved) {
          n.unlocked = saved.unlocked;
          n.visitCount = saved.visitCount || 0;
        }
      }
    }
    if (data.bounties) {
      for (let i = 0; i < G.bounties.length; i++) {
        if (data.bounties[i]) {
          G.bounties[i].c = data.bounties[i].c;
          G.bounties[i].done = data.bounties[i].done;
          G.bounties[i].refreshDay = data.bounties[i].refreshDay;
        }
      }
    }
    if (data.storyline) {
      for (let i = 0; i < G.storyline.length; i++) {
        if (data.storyline[i]) {
          G.storyline[i].done = data.storyline[i].done;
          G.storyline[i].unlocked = data.storyline[i].unlocked;
        }
      }
    }
    if (data.currentBoss !== undefined) {
      G.currentBoss = data.currentBoss;
    }
    G.log = data.log || ['Welcome back to Legends of Daybreak, San.'];
    lg('Game loaded!');
    return true;
  } catch(e) {
    console.error('Load failed:', e);
    return false;
  }
}

function resetGame() {
  if (confirm('Are you sure? ALL progress will be lost forever!')) {
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

function exportSave() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) { lg('No save data to export.'); return; }
  const blob = new Blob([raw], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'legends-daybreak-save.json';
  a.click();
  URL.revokeObjectURL(url);
  lg('Save exported!');
}

function importSave() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        JSON.parse(ev.target.result);
        localStorage.setItem(SAVE_KEY, ev.target.result);
        loadGame();
        render();
        lg('Save imported!');
      } catch(err) {
        lg('Invalid save file!');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

  for(let p of G.party){
    h+='<div class="pcard '+(p.on?'':'locked')+'"><div class="pava" style="background:'+p.col+'20;border-color:'+p.col+'"><span style="font-size:28px">'+(p.on?re(p.r):'🔒')+'</span></div><div class="pinfo"><div class="pn">'+p.n+' <span class="pt">'+p.t+'</span></div><div class="pr" style="color:'+p.col+'">'+p.r+'</div><div class="pd">'+p.d+'</div><div class="pb">'+p.b+'</div>'+(p.on?'<div class="ps">HP:'+p.hp+'/'+p.mhp+' ATK:'+p.atk+' DEF:'+p.def+' SPD:'+p.spd+'</div>':'')+(G.affinity[p.n]?'<div class="affinity-bar"><div class="affinity-fill '+getAffinityColor(G.affinity[p.n].val)+'" style="width:'+(G.affinity[p.n].val/G.affinity[p.n].max*100)+'%"></div></div><div class="affinity-label">'+(G.affinity[p.n].val>=70?'💕 Close':G.affinity[p.n].val>=40?'💛 Friendly':G.affinity[p.n].val>=20?'💔 Distant':'💀 Strained')+' ('+G.affinity[p.n].val+'/'+G.affinity[p.n].max+')</div>':'')+'</div></div>';
  }
  h+='</div></div>'; return h;
}

function rSkills(){
  let h='<div class="skills-view"><h2 class="st">Mage Skills</h2><div class="sklist">';
  for(let s of G.p.skills){
    const st=s.on?'LEARNED':'Unlocks Lv.'+s.ul;
    h+='<div class="skcard '+(s.on?'':'locked')+'"><div class="skh"><span class="ski">'+(s.buff?'🛡️':'⚡')+'</span><span class="skt">'+s.n+'</span><span class="sks">'+st+'</span></div><div class="skd"><span class="dp">'+s.c+' MP</span><span class="dp">'+(s.dmg||'Buff')+'</span></div><div class="skdsc">'+s.d+'</div></div>';
  }
  h+='</div><div class="stb"><h3>Character Stats</h3>';
  for(let [k,v] of Object.entries(G.p.stats))h+='<div class="str"><span class="stn">'+k.toUpperCase()+'</span><span class="stv">'+v+'</span></div>';
  h+='</div></div>'; return h;
}

function rInv(){
  let h='<div class="inventory-view"><h2 class="st">Inventory</h2>';
  h+='<div class="eqs"><h3>Equipped</h3><div class="eqg">';
  const sn={w:'Weapon',a:'Armor',acc:'Accessory'};
  for(let sl of ['w','a','acc']){
    const it=G.p.eq[sl];
    h+='<div class="esl"><div class="esn">'+sn[sl]+'</div>'+(it?'<div class="eit" style="color:'+rc(it.r)+'">'+it.n+'</div><div class="est">'+(it.atk?'ATK +'+it.atk:it.def?'DEF +'+it.def:it.int?'INT +'+it.int:'')+'</div>':'<div class="ese">Empty</div>')+'</div>';
  }
  h+='</div></div>';
  h+='<div class="its"><h3>Items ('+G.p.inv.length+')</h3><div class="ig">';
  for(let i=0;i<G.p.inv.length;i++){
    const it=G.p.inv[i];
    h+='<div class="ic"><div class="ii">'+ie(it)+'</div><div class="in" style="color:'+rc(it.r)+'">'+it.n+'</div><div class="iq">x'+it.q+'</div><div class="ia">'+(it.t=='pot'?'<button class="ib ib-u" data-i="'+i+'">Use</button>':'')+((it.t=='wep'||it.t=='arm'||it.t=='acc')?'<button class="ib ib-e" data-i="'+i+'">Equip</button>':'')+'</div></div>';
  }
  if(G.p.inv.length==0)h+='<div class="ei">Your pack is empty.</div>';
  h+='</div></div></div>'; return h;
}

function rCraft(){
  let h='<div class="craft-view"><h2 class="st">Crafting</h2><div class="rlist">';
  for(let i=0;i<G.recipes.length;i++){
    const r=G.recipes[i]; let ok=true,ms='';
    for(let [mn,mq] of Object.entries(r.m)){
      const iv=G.p.inv.find(x=>x.n==mn);
      const hv=iv?iv.q:0,en=hv>=mq;
      if(!en)ok=false;
      ms+='<span class="mp '+(en?'ok':'miss')+'">'+mn+': '+hv+'/'+mq+'</span>';
    }
    h+='<div class="rc"><div class="rr"><span class="ri">'+ie(r.res)+'</span><span class="rn" style="color:'+rc(r.res.r)+'">'+r.n+'</span><span class="rd">'+r.d+'</span></div><div class="rms">'+ms+'</div><button class="cb '+(ok?'':'dis')+'" data-i="'+i+'">Forge</button></div>';
  }
  h+='</div></div>'; return h;
}

function rQuest(){
  let h='<div class="quest-view">';
  // Storyline section
  h+='<h2 class="st">📖 Storyline</h2><div class="qlist">';
  for(let s of G.storyline){
    if(!s.unlocked) continue;
    const pc=Math.min(100,(G.p.lvl/s.need)*100);
    h+='<div class="qc '+(s.done?'done':'')+'" style="border-color:var(--accent-light);"><div class="qh"><span class="qn">'+(s.done?'✅ ':'')+'Ch.'+s.chapter+': '+s.n+'</span><span class="qr">'+s.rw.xp+' XP | '+s.rw.g+' G</span></div>';
    h+='<div class="qd">'+s.d+'</div><div class="qp"><div class="pbar"><div class="pfill" style="width:'+pc+'%"></div></div><span class="ptxt">Lv.'+G.p.lvl+'/'+s.need+'</span></div></div>';
  }
  h+='</div>';
  // Active quests section
  h+='<h2 class="st" style="margin-top:20px;">📜 Active Quests</h2><div class="qlist">';
  for(let q of G.quests){
    if(q.hidden && !q.revealed) continue;
    const pc=Math.min(100,(q.c/q.need)*100);
    const timerStatus=getTimerStatus(q);
    let cardClass=q.done?'done':(q.expired?'expired':(timerStatus?(timerStatus.cls==='timer-urgent'?'timed-urgent':'timed'):''));
    h+='<div class="qc '+cardClass+'"><div class="qh"><span class="qn">'+(q.done?'✅ ':(q.expired?'❌ ':''))+q.n+'</span><span class="qr">'+q.rw.xp+' XP | '+q.rw.g+' G</span></div>';
    if(q.chain){
      h+='<div style="font-size:10px;color:var(--accent-light);margin-bottom:4px;">🔗 Chain: '+q.chain+'</div>';
    }
    if(q.reqQuest && !q.revealed){
      const req=G.quests.find(rq=>rq.id===q.reqQuest);
      h+='<div style="font-size:10px;color:var(--text-dim);font-style:italic;margin-bottom:4px;">🔒 Requires: '+(req?req.n:'Unknown')+'</div>';
    }
    h+='<div class="qd">'+q.d+'</div>';
    if(timerStatus){
      h+='<div class="timer-bar"><div class="timer-fill '+timerStatus.cls+'" style="width:'+timerStatus.pct+'%"></div></div>';
      h+='<div class="timer-label">⏰ '+timerStatus.label+'</div>';
    }
    h+='<div class="qp"><div class="pbar"><div class="pfill" style="width:'+pc+'%"></div></div><span class="ptxt">'+Math.min(q.c,q.need)+'/'+q.need+'</span></div></div>';
  }
  h+='</div>';
  // Bounties section
  h+='<h2 class="st" style="margin-top:20px;">💰 Bounties (Daily)</h2><div class="qlist">';
  for(let b of G.bounties){
    if(b.done) continue;
    const pc=Math.min(100,(b.c/b.need)*100);
    h+='<div class="qc"><div class="qh"><span class="qn">'+b.n+'</span><span class="qr">'+b.rw.xp+' XP | '+b.rw.g+' G</span></div>';
    h+='<div class="qd">'+b.d+'</div><div class="qp"><div class="pbar"><div class="pfill" style="width:'+pc+'%"></div></div><span class="ptxt">'+b.c+'/'+b.need+'</span></div></div>';
  }
  h+='</div>';
  h+='<div class="sum"><div class="si2"><span class="sv">'+G.p.kills+'</span><span class="sl">Monsters</span></div><div class="si2"><span class="sv">'+G.p.quests+'</span><span class="sl">Quests</span></div><div class="si2"><span class="sv">'+G.p.fstreak+'</span><span class="sl">Focus</span></div></div></div>';
  return h;
}

function rFocus(){
  const el=Date.now()-(G.fs||Date.now()),rm=Math.max(0,G.fd-el);
  const m=Math.floor(rm/60000),s=Math.floor((rm%60000)/1000);
  return '<div class="fv"><div class="fc"><div class="ft" id="ft">'+m+':'+s.toString().padStart(2,'0')+'</div><div class="fl">Focus Mode</div></div><div class="ftips"><h3>ADHD Tips</h3><ul><li>One task at a time. No multitasking.</li><li>Put your phone face down.</li><li>Break the task into tiny steps.</li><li>Reward: +100 XP when done!</li></ul></div><button class="cfb">Cancel</button></div>';
}

function rTemple() {
  const dead = getDeadParty();
  let h2 = '<div class="rest-view">';
  h2 += '<h2 class="st">⛪ Temple of Resurrection</h2>';
  h2 += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">Ancient magic restores fallen companions. Cost: 50G each.</div>';
  if(dead.length === 0){
    h2 += '<div style="text-align:center;padding:20px;color:var(--success);">✨ All companions are alive!</div>';
  }else{
    h2 += '<div style="margin-bottom:12px;">';
    for(let p of G.party){
      const isDead = p.hp <= 0;
      const canAfford = G.p.gold >= 50;
      h2 += '<div class="temple-revive ' + (isDead ? 'dead' : 'alive') + '">';
      h2 += '<div class="tr-ava" style="background:' + p.col + '20;border-color:' + p.col + '">' + (isDead ? '💀' : re(p.r)) + '</div>';
      h2 += '<div class="tr-info">';
      h2 += '<div class="tr-name">' + p.n + '</div>';
      h2 += '<div class="tr-status ' + (isDead ? '' : 'alive') + '">' + (isDead ? '💀 FALLEN' : '✅ Alive ' + p.hp + '/' + p.mhp) + '</div>';
      h2 += '</div>';
      if(isDead) h2 += '<button class="tr-btn ' + (canAfford ? '' : 'dis') + '" data-m="' + p.n + '">' + (canAfford ? 'Revive (50G)' : 'Need 50G') + '</button>';
      h2 += '</div>';
    }
    h2 += '</div>';
  }
  h2 += '</div>';
  return h2;
}

function rRest() {
  const dead = getDeadParty();
  if(dead.length > 0 && !G.rest.active) return rTemple();

  if (G.rest.active && G.rest.selectedSite) {
    const site = G.rest.selectedSite;
    const currentTick = G.rest.tick;
    const maxTicks = G.rest.maxTicks;
    const pct = (currentTick / maxTicks) * 100;
    const healerName = getHealerName();
    let h2 = '<div class="rest-view">';
    h2 += '<h2 class="st">🔥 Resting at ' + site.name + '</h2>';
    if (G.ambushWarning) {
      h2 += '<div class="ambush-warning">';
      h2 += '<div class="aw-text">⚠️ ' + G.ambushWarning.text + '</div>';
      h2 += '</div>';
    }
    if (G.currentDialogue && !G.ambushWarning) {
      h2 += '<div class="dialogue-box">';
      h2 += '<div class="d-speaker">' + G.currentDialogue.speaker + '</div>';
      h2 += '<div class="d-text">' + G.currentDialogue.text + '</div>';
      h2 += '</div>';
    }
    h2 += '<div class="tick-track">';
    for (let i = 1; i <= maxTicks; i++) {
      let tickClass = '';
      let tickIcon = '○';
      if (i < currentTick) {
        tickClass = 'done';
        tickIcon = '✓';
      } else if (i === currentTick) {
        tickClass = 'current';
        tickIcon = '🔥';
      }
      h2 += '<div class="tick ' + tickClass + '">' + tickIcon + '</div>';
    }
    h2 += '</div>';
    h2 += '<div class="tick-label">Tick ' + currentTick + '/' + maxTicks + '</div>';
    h2 += '<div class="rest-progress" style="margin-top:16px;">';
    h2 += '<div class="rest-bar"><div class="rest-fill" style="width:' + pct + '%"></div></div>';
    h2 += '<div class="rest-healer ok">💚 ' + healerName + ' is tending to the party</div>';
    h2 += '</div>';
    h2 += '<button class="rest-cancel" id="cancel-rest">Cancel Rest (Partial Recovery)</button>';
    h2 += '</div>';
    return h2;
  }

  const healerOk = hasHealer();
  const healerName = getHealerName();
  let h2 = '<div class="rest-view">';
  h2 += '<h2 class="st">💤 Rest</h2>';
  if (healerOk) {
    h2 += '<div class="rest-healer ok" style="background:#22c55e15;border:1px solid var(--success);border-radius:12px;padding:12px;margin-bottom:16px;text-align:left;">';
    h2 += '<div style="font-size:13px;font-weight:600;color:var(--success);">💚 Healer Available: ' + healerName + '</div>';
    h2 += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">5 ticks, 1.5s each. Dialogue every tick. Ambush chance: 15% camp / 5% tavern.</div>';
    h2 += '</div>';
  } else {
    h2 += '<div class="rest-healer fail" style="background:#ef444415;border:1px solid var(--danger);border-radius:12px;padding:12px;margin-bottom:16px;text-align:left;">';
    h2 += '<div style="font-size:13px;font-weight:600;color:var(--danger);">❌ No Healer in Party</div>';
    h2 += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">You need a healer (like Eliz) in your active party to rest safely.</div>';
    h2 += '</div>';
  }
  h2 += '<div class="rest-sites">';
  const zones = {};
  for (let site of G.rest.sites) {
    if (!zones[site.zone]) zones[site.zone] = [];
    zones[site.zone].push(site);
  }
  for (let zoneName in zones) {
    const sites = zones[zoneName];
    const anyUnlocked = sites.some(s => s.unlocked);
    if (!anyUnlocked) continue;
    h2 += '<div style="margin-bottom:12px;">';
    h2 += '<div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">' + zoneName + '</div>';
    for (let site of sites) {
      const locked = !site.unlocked;
      const canAfford = !site.cost || G.p.gold >= site.cost;
      const canRest = healerOk && !locked && canAfford;
      h2 += '<div class="rs-card ' + (locked ? 'locked' : '') + '" data-id="' + site.id + '">';
      h2 += '<div class="rs-head">';
      h2 += '<span class="rs-name">' + site.icon + ' ' + site.name + '</span>';
      h2 += '<span class="rs-type ' + site.type + '">' + site.type.toUpperCase() + '</span>';
      h2 += '</div>';
      h2 += '<div class="rs-desc">' + site.desc + '</div>';
      if (locked) {
        h2 += '<div class="rs-req fail">🔒 Requires Level ' + site.zoneLv + ' to discover</div>';
      } else if (site.cost) {
        h2 += '<div class="rs-req ' + (canAfford ? 'ok' : 'fail') + '">' + (canAfford ? '✅' : '❌') + ' Cost: ' + site.cost + 'G · Ambush: 5% | ' + (canRest ? 'Tap to rest' : 'Cannot rest') + '</div>';
      } else {
        h2 += '<div class="rs-req ' + (healerOk ? 'ok' : 'fail') + '">' + (healerOk ? '✅' : '❌') + ' Free · Ambush: 15% | ' + (canRest ? 'Tap to rest' : 'Cannot rest') + '</div>';
      }
      h2 += '</div>';
    }
    h2 += '</div>';
  }
  h2 += '</div>';
  h2 += '<div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;">Rest takes ~7.5 seconds. Party banter every tick. Taverns cost gold but are safer.</div>';
  h2 += '</div>';
  return h2;
}

document.addEventListener('DOMContentLoaded', function() {
  const hasSave = loadGame();
  if (!hasSave) {
    lg('Welcome to Legends of Daybreak, San.');
    lg('Tap Adventure to start your journey!');
  }
  render();
});
</script>
</body>
</html>
